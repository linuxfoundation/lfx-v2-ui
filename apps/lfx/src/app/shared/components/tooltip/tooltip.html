<div class="flex rounded-md bg-neutral-900 px-2 py-1.5 shadow-lg" [class]="containerClasses()" data-testid="tooltip-container" role="tooltip">
  <span class="text-xs leading-4 font-semibold text-white" [class]="labelClasses()" data-testid="tooltip-label">{{ label() }}</span>
  @if (description()) {
    <span class="text-xs leading-4 font-normal text-neutral-300" data-testid="tooltip-description">{{ description() }}</span>
  }
</div>
