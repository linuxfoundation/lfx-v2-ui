<div class="inline-flex items-center justify-center overflow-hidden" [class]="avatarClasses()" data-testid="avatar-container">
  @if (showImage()) {
    <img class="size-full object-cover" [src]="src()" [alt]="alt()" (error)="onImageError()" />
  } @else if (type() === 'placeholder') {
    <i class="fa-light fa-user"></i>
  } @else if (type() === 'project-placeholder') {
    <i class="fa-light fa-diagram-project"></i>
  } @else if (type() === 'org-placeholder') {
    <i class="fa-light fa-building"></i>
  } @else {
    <span class="leading-none font-medium">{{ initials() }}</span>
  }
</div>
