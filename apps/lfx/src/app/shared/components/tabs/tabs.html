<div class="inline-flex items-center" [class]="containerClasses()" data-testid="tabs-container">
  @for (tab of tabs(); track tab.value) {
    <lfx-tab-item
      [label]="tab.label"
      [value]="tab.value"
      [icon]="tab.icon ?? ''"
      [selected]="isSelected(tab.value)"
      [tabStyle]="tabStyle()"
      [size]="size()"
      (selectTab)="onTabSelect($event)" />
  }
</div>
