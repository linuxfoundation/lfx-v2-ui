<div
  class="sticky z-40 bg-white border-b border-gray-200 flex items-center h-[48px] px-10"
  [ngClass]="showDevToolbar() ? 'top-[48px]' : 'top-0'"
  data-testid="top-bar">
  <!-- Breadcrumb -->
  <nav class="flex items-center gap-2 text-sm" aria-label="Breadcrumb">
    <!-- Lens / Home -->
    <div class="flex items-center gap-1.5 text-gray-600">
      <i [class]="breadcrumb().lens.icon" class="text-base"></i>
      <span class="font-medium">{{ breadcrumb().lens.label }}</span>
    </div>

    <!-- Separator + Page -->
    @if (breadcrumb().page) {
      <i class="fa-light fa-chevron-right text-gray-400 text-xs"></i>
      <span class="text-gray-900 font-medium">{{ breadcrumb().page }}</span>
    }
  </nav>
</div>
