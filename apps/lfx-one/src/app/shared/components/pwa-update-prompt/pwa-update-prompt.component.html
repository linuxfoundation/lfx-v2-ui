@if (updateReady()) {
  <div
    class="fixed bottom-4 right-4 z-[1100] flex max-w-sm items-center gap-3 rounded-xl bg-slate-900 px-4 py-3 text-sm text-white shadow-xl"
    data-testid="pwa-update-toast"
    role="status"
    aria-live="polite">
    <i class="fa-light fa-arrows-rotate"></i>
    <span class="flex-1">A new version of LFX is ready.</span>
    <lfx-button label="Refresh" size="small" severity="contrast" (onClick)="onReload()" data-testid="pwa-update-reload" />
  </div>
}
