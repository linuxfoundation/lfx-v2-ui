<!-- Interactive trigger — always rendered; popover shows an empty state when items are unavailable -->
<button
  type="button"
  class="box-border content-stretch flex gap-3 items-center overflow-clip p-3 relative w-full cursor-pointer hover:bg-gray-50 transition-colors rounded-lg"
  (click)="togglePanel($event, popover)"
  [attr.aria-expanded]="popover.overlayVisible"
  data-testid="project-selector">
  <!-- Logo -->
  <div class="bg-gray-100 overflow-clip relative rounded-full shrink-0 size-10">
    <div class="flex items-center justify-center size-full p-2.5">
      @if (displayLogo()) {
        <img [alt]="displayName()" class="w-full h-full object-contain" [src]="displayLogo()" />
      } @else {
        <img src="images/logo_lfx.svg" alt="LFX Logo" />
      }
    </div>
  </div>

  <!-- Text -->
  <div class="flex flex-col gap-1 grow items-start relative min-w-0">
    <p class="sidebar-project-name">{{ displayName() }}</p>
  </div>

  <!-- Toggle Icon -->
  <i class="fa-light fa-angles-up-down shrink-0 text-gray-400" aria-hidden="true"></i>
</button>

<!-- Popover for Lens Items List -->
<p-popover
  #popover
  appendTo="body"
  [style]="{ width: '28rem' }"
  [styleClass]="panelStyleClass()"
  (onShow)="onPopoverShow()"
  (onHide)="onPopoverHide()"
  data-testid="project-selector-panel">
  <div class="p-2">
    <!-- Search Input -->
    <div class="relative mb-2">
      <i class="fa-light fa-search absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
      <input
        [pAutoFocus]="true"
        pInputText
        type="text"
        [formControl]="searchControl"
        [placeholder]="searchPlaceholder()"
        class="pl-10 h-9 w-full text-sm bg-gray-50"
        data-testid="project-search-input" />
    </div>

    <!-- Items List (flat — hierarchy no longer supported server-side) -->
    <div class="max-h-[400px] overflow-y-auto">
      @for (item of items(); track item.uid; let i = $index) {
        <!-- Auto-load sentinel — placed 8 items from the end. On each page load the items
             array grows, the sentinel's $index shifts, Angular destroys + re-creates the
             OnRenderDirective, and afterNextRender re-fires to request the next page. -->
        @if (i === autoLoadTriggerIndex() && hasMore()) {
          @defer (on viewport) {
            <div lfxOnRender (rendered)="loadMore()" class="h-0 w-full" aria-hidden="true"></div>
          } @placeholder {
            <div class="h-0 w-full" aria-hidden="true"></div>
          }
        }

        <button
          type="button"
          class="flex items-center gap-3 p-2 w-full text-left hover:bg-gray-100 rounded-lg transition-colors"
          (click)="selectItem(item, popover)"
          [attr.data-testid]="'lens-item-' + item.slug">
          <!-- Item Logo -->
          <div class="bg-gray-100 overflow-clip rounded-full shrink-0 size-8">
            <div class="flex items-center justify-center size-full p-2">
              @if (item.logoUrl) {
                <img [alt]="item.name" class="w-full h-full object-contain" [src]="item.logoUrl" />
              } @else {
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3.96369 15.9789V7.98987H0V19.9504H11.9372V15.9789H3.96369Z" fill="#0094FF" />
                  <path d="M19.8645 0H0V6.00333H3.96369V4.01761H15.9009V15.9781H13.919V19.9495H19.8645V0Z" fill="#003778" />
                </svg>
              }
            </div>
          </div>

          <!-- Item Info -->
          <div class="flex-1 min-w-0">
            <p class="font-medium text-sm text-gray-900 mb-0">{{ item.name || item.slug }}</p>
          </div>
        </button>
      } @empty {
        @if (!loading()) {
          <div class="text-center py-8 text-gray-500 text-sm">{{ emptyMessage() }}</div>
        }
      }

      <!-- Loading indicator -->
      @if (loading()) {
        <div class="flex items-center justify-center py-3 text-gray-500 text-sm gap-2">
          <i class="fa-light fa-spinner fa-spin"></i>
          <span>Loading...</span>
        </div>
      }
    </div>
  </div>
</p-popover>
