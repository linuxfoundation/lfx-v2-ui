<div class="flex flex-col items-center h-full bg-blue-900 py-4" data-testid="lens-switcher">
  <!-- LF Logo -->
  <a [routerLink]="['/']" class="mb-6 flex items-center justify-center px-3" aria-label="Linux Foundation Home">
    <img src="/images/logo_lf_white.svg" alt="Linux Foundation" class="w-[24px] h-[24px]" />
  </a>

  <!-- Home Button -->
  <button
    type="button"
    (click)="navigateHome()"
    data-testid="lens-home"
    aria-label="Home"
    pTooltip="Home"
    tooltipPosition="right"
    class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors mb-2"
    [ngClass]="{
      'bg-blue-500/20 text-blue-400': isHome(),
      'text-blue-200/70 hover:bg-white/10 hover:text-white': !isHome(),
    }">
    <i [ngClass]="isHome() ? 'fa-solid fa-objects-column' : 'fa-light fa-objects-column'" class="text-xl"></i>
  </button>

  <!-- Separator -->
  <hr class="w-6 border-white/20 mb-2" />

  <!-- Lens Buttons -->
  <div class="flex flex-col items-center gap-2 flex-1">
    @for (lens of lenses; track lens.id) {
      <button
        type="button"
        (click)="setLens(lens.id)"
        [attr.data-testid]="lens.testId"
        [attr.aria-label]="'Switch to ' + lens.label + ' lens'"
        [pTooltip]="lens.label"
        tooltipPosition="right"
        class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors"
        [ngClass]="{
          'bg-blue-500/20 text-blue-400': activeLens() === lens.id && !isHome(),
          'text-blue-200/70 hover:bg-white/10 hover:text-white': activeLens() !== lens.id || isHome(),
        }">
        <i [ngClass]="activeLens() === lens.id && !isHome() ? lens.activeIcon : lens.icon" class="text-xl"></i>
      </button>
    }
  </div>

  <!-- Footer -->
  <div class="flex flex-col items-center gap-3 mt-auto">
    <!-- LFX Insights -->
    <a
      href="https://insights.linuxfoundation.org/"
      target="_blank"
      rel="noopener noreferrer"
      data-testid="lens-insights"
      aria-label="LFX Insights"
      [pTooltip]="insightsTooltip"
      [escape]="false"
      tooltipPosition="right"
      class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors text-blue-200/70 hover:bg-white/10 hover:text-white">
      <i class="fa-light fa-chart-simple text-xl"></i>
    </a>

    <!-- Separator -->
    <hr class="w-6 border-white/20" />

    <!-- User Avatar -->
    <button
      type="button"
      (click)="toggleDropdown()"
      aria-label="User menu"
      data-testid="lens-user-avatar"
      class="flex items-center justify-center w-[34px] h-[34px] rounded-full overflow-hidden transition-all hover:ring-2 hover:ring-white/30 focus:outline-none shrink-0">
      @if (user()?.picture) {
        <img [src]="user()!.picture" [alt]="user()!.name" class="w-full h-full object-cover" />
      } @else {
        <div class="flex items-center justify-center w-full h-full bg-blue-600 text-white text-sm font-semibold">
          {{ userInitials() }}
        </div>
      }
    </button>
  </div>
</div>

<!-- Dropdown — rendered outside component via fixed position to avoid stacking context issues -->
@if (showDropdown()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-[200]" (click)="closeDropdown()"></div>

  <!-- Panel -->
  <div class="fixed bottom-4 left-[72px] z-[201] w-64 bg-white rounded-lg shadow-xl border border-gray-200 overflow-hidden">
    <!-- User identity -->
    <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100">
      <div class="shrink-0 w-9 h-9 rounded-full overflow-hidden">
        @if (user()?.picture) {
          <img [src]="user()!.picture" [alt]="user()!.name" class="w-full h-full object-cover" />
        } @else {
          <div class="flex items-center justify-center w-full h-full bg-blue-600 text-white text-sm font-semibold">
            {{ userInitials() }}
          </div>
        }
      </div>
      <div class="flex flex-col min-w-0">
        <span class="font-semibold text-sm text-gray-900 truncate">{{ user()?.name }}</span>
        <span class="text-xs text-gray-500 truncate">{{ user()?.email }}</span>
      </div>
    </div>

    <!-- My Profile, Changelog & Support -->
    <div class="py-1 border-b border-gray-100">
      <a
        routerLink="/profile"
        data-testid="lens-profile"
        (click)="closeDropdown()"
        class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
        <i class="fa-light fa-user w-4 text-gray-400"></i>
        <span>My profile</span>
      </a>
      <a
        href="https://changelog.lfx.dev/"
        target="_blank"
        rel="noopener noreferrer"
        data-testid="lens-changelog"
        (click)="closeDropdown()"
        class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
        <i class="fa-light fa-clock-rotate-left w-4 text-gray-400"></i>
        <span>Changelog</span>
      </a>
      <a
        href="https://jira.linuxfoundation.org/servicedesk/customer/portal/4"
        target="_blank"
        rel="noopener noreferrer"
        data-testid="lens-support"
        (click)="closeDropdown()"
        class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
        <i class="fa-light fa-question-circle w-4 text-gray-400"></i>
        <span>Support</span>
      </a>
    </div>

    <!-- Sign out -->
    <div class="py-1">
      <a
        href="/logout"
        data-testid="lens-logout"
        class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
        <i class="fa-light fa-arrow-right-from-bracket w-4 text-gray-400"></i>
        <span>Sign out</span>
      </a>
    </div>
  </div>
}
