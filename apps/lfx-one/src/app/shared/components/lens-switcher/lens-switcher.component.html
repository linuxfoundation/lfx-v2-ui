<div class="flex flex-col items-center h-full bg-blue-900 py-4" data-testid="lens-switcher">
  <!-- LF Logo -->
  <a [routerLink]="['/']" class="mb-6 flex items-center justify-center px-3" aria-label="Linux Foundation Home">
    <img src="/images/logo_lf_white.svg" alt="Linux Foundation" class="w-[24px] h-[24px]" />
  </a>

  <!-- Home Button -->
  <button
    type="button"
    (click)="navigateHome()"
    data-testid="lens-home"
    aria-label="Home"
    pTooltip="Home"
    tooltipPosition="right"
    class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors mb-1"
    [ngClass]="{
      'bg-blue-500/20 text-blue-400': isHome(),
      'text-white/80 hover:bg-white/10 hover:text-white': !isHome(),
    }">
    <i [ngClass]="isHome() ? 'fa-solid fa-house' : 'fa-light fa-house'" class="text-xl"></i>
  </button>

  <!-- Separator -->
  <hr class="w-6 border-white/20 mb-3" />

  <!-- Lens Buttons -->
  <div class="flex flex-col items-center gap-2 flex-1">
    @for (lens of lenses; track lens.id) {
      <button
        type="button"
        (click)="setLens(lens.id)"
        [attr.data-testid]="lens.testId"
        [attr.aria-label]="'Switch to ' + lens.label + ' lens'"
        [pTooltip]="lens.label"
        tooltipPosition="right"
        class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors"
        [ngClass]="{
          'bg-blue-500/20 text-blue-400': activeLens() === lens.id && !isHome(),
          'text-white/80 hover:bg-white/10 hover:text-white': activeLens() !== lens.id || isHome(),
        }">
        <i [ngClass]="activeLens() === lens.id && !isHome() ? lens.activeIcon : lens.icon" class="text-xl"></i>
      </button>
    }
  </div>

  <!-- Footer Actions -->
  <div class="flex flex-col items-center gap-2 mt-auto">
    <!-- LFX Insights -->
    <a
      href="https://insights.linuxfoundation.org/"
      target="_blank"
      rel="noopener noreferrer"
      data-testid="lens-insights"
      aria-label="LFX Insights"
      [pTooltip]="insightsTooltip"
      [escape]="false"
      tooltipPosition="right"
      class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors text-white/80 hover:bg-white/10 hover:text-white">
      <i class="fa-light fa-chart-simple text-xl"></i>
    </a>

    <!-- Separator -->
    <hr class="w-6 border-white/20" />

    @for (action of footerActions; track action.label) {
      <a
        [href]="action.url"
        [target]="action.target"
        rel="noopener noreferrer"
        [attr.data-testid]="action.testId"
        [attr.aria-label]="action.label"
        [pTooltip]="action.tooltipHtml"
        [escape]="false"
        tooltipPosition="right"
        class="flex items-center justify-center w-[40px] h-[40px] rounded-full transition-colors text-white/80 hover:bg-white/10 hover:text-white">
        <i [ngClass]="action.icon" class="text-xl"></i>
      </a>
    }
  </div>
</div>
