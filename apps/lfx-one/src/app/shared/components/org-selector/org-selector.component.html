<button
  type="button"
  class="box-border content-stretch flex gap-3 items-center overflow-clip p-3 relative w-full cursor-pointer hover:bg-gray-50 transition-colors rounded-lg"
  (click)="togglePanel($event, popover)"
  [attr.aria-expanded]="popover.overlayVisible"
  data-testid="org-selector">
  <div class="bg-gray-100 overflow-clip relative rounded-lg shrink-0 size-11 border border-gray-200">
    <div class="flex items-center justify-center size-full p-1.5">
      @if (displayLogo()) {
        <img [alt]="displayName()" class="w-full h-full object-contain" [src]="displayLogo()" />
      } @else {
        <i class="fa-light fa-building text-gray-500 text-lg" aria-hidden="true"></i>
      }
    </div>
  </div>

  <div class="flex flex-col gap-0.5 grow items-start relative min-w-0 overflow-hidden">
    <p class="sidebar-org-name" [attr.title]="displayName()">{{ displayName() }}</p>
    <span class="text-xs font-normal text-gray-400 leading-none">Organization</span>
  </div>

  <i class="fa-light fa-angles-up-down shrink-0 text-gray-400" aria-hidden="true"></i>
</button>

<p-popover
  #popover
  appendTo="body"
  [style]="{ width: '28rem' }"
  [styleClass]="panelStyleClass()"
  (onShow)="onPopoverShow()"
  (onHide)="onPopoverHide()"
  data-testid="org-selector-panel">
  <div class="p-1">
    <div class="relative mb-2">
      <i class="fa-light fa-search absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400"></i>
      <input
        [pAutoFocus]="true"
        pInputText
        type="text"
        [formControl]="searchControl"
        placeholder="Search organizations..."
        class="pl-10 h-9 w-full text-sm bg-gray-50"
        data-testid="org-selector-search-input" />
    </div>

    <div class="max-h-[400px] overflow-y-auto">
      @for (account of visibleAccounts(); track account.accountId) {
        <button
          type="button"
          class="flex items-center gap-3 p-2 w-full text-left hover:bg-gray-100 rounded-lg transition-colors"
          [class.bg-blue-50]="selectedAccountId() === account.accountId"
          (click)="selectItem(account, popover)"
          [attr.data-testid]="'org-selector-item-' + (account.accountSlug || account.accountId)">
          <div class="bg-gray-100 overflow-clip rounded-lg shrink-0 size-9 border border-gray-200">
            <div class="flex items-center justify-center size-full p-1.5">
              @if (account.logoUrl) {
                <img [alt]="account.accountName" class="w-full h-full object-contain" [src]="account.logoUrl" />
              } @else {
                <i class="fa-light fa-building text-gray-500" aria-hidden="true"></i>
              }
            </div>
          </div>

          <div class="flex-1 min-w-0">
            <p class="font-medium text-sm text-gray-900 mb-0">{{ account.accountName }}</p>
          </div>

          @if (selectedAccountId() === account.accountId) {
            <i class="fa-solid fa-check text-blue-600 text-sm" aria-hidden="true"></i>
          }
        </button>
      } @empty {
        <div class="text-center py-8 text-gray-500 text-sm">No organizations found</div>
      }
    </div>
  </div>
</p-popover>
