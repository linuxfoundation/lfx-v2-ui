<p-drawer
  [(visible)]="visible"
  position="right"
  [modal]="true"
  [showCloseIcon]="false"
  styleClass="xl:w-[45%] lg:w-[55%] md:w-[70%] sm:w-[90%] w-full"
  data-testid="org-event-attendees-drawer">
  <!-- Header -->
  <ng-template #header>
    <div class="flex items-start justify-between gap-4 w-full" data-testid="org-event-attendees-drawer-header">
      <div class="flex flex-col gap-1 flex-1">
        <h2 class="text-lg font-semibold text-gray-900" data-testid="org-event-attendees-drawer-title">Event Attendees</h2>
        <p class="text-sm text-gray-500">Board Member · Organization view</p>
      </div>

      <button
        type="button"
        (click)="onClose()"
        class="p-1 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-md transition-colors flex-shrink-0"
        aria-label="Close panel"
        data-testid="org-event-attendees-drawer-close">
        <i class="fa-light fa-xmark text-xl"></i>
      </button>
    </div>
  </ng-template>

  <!-- Content -->
  <div class="flex flex-col gap-6 pb-2" data-testid="org-event-attendees-drawer-content">
    <!-- Event Attendance Chart Section -->
    <div class="flex flex-col gap-3" data-testid="org-event-attendees-drawer-chart-section">
      <div class="flex flex-col gap-1">
        <h3 class="text-sm font-medium text-gray-900">Event Attendance</h3>
        <p class="text-sm text-gray-500">Number of organizational attendees at foundation events (last 12 months)</p>
      </div>

      @if (drawerLoading()) {
        <div class="flex items-center justify-center py-12" data-testid="org-event-attendees-drawer-loading">
          <i class="fa-light fa-spinner-third fa-spin text-2xl text-gray-400"></i>
        </div>
      } @else if (hasData()) {
        <div class="h-[260px]" data-testid="org-event-attendees-drawer-chart">
          <lfx-chart type="bar" [data]="chartData()" [options]="attendanceChartOptions" height="100%"></lfx-chart>
        </div>
      } @else {
        <div class="text-center py-8 border border-slate-200 rounded-lg" data-testid="org-event-attendees-drawer-empty">
          <i class="fa-light fa-eyes text-3xl text-gray-400 mb-2 block"></i>
          <p class="text-sm text-gray-500">No event attendance data available for this foundation.</p>
        </div>
      }
    </div>

    <!-- Insights Handoff -->
    <lfx-insights-handoff-section
      title="Looking for event details?"
      description="Event-level participation details and attendee lists are available in the Organization Dashboard."
      [link]="insightsUrl"
      buttonLabel="View Organization Dashboard"
      data-testid="org-event-attendees-drawer-insights-handoff"></lfx-insights-handoff-section>
  </div>
</p-drawer>
