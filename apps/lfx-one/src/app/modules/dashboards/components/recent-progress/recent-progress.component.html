<section data-testid="dashboard-recent-progress-section">
  <!-- Section header with inline divider -->
  <div class="flex items-center gap-3 mb-6">
    <div class="flex items-center gap-2 shrink-0">
      <h2 class="flex items-center gap-2 text-base font-medium text-gray-900">
        <i class="fa-light fa-chart-simple text-lg"></i>
        <span>Recent Progress</span>
      </h2>
      <!-- Filter pills (maintainers only) — inline with title -->
      @if (showFilterPills()) {
        <lfx-filter-pills [options]="filterOptions" [selectedFilter]="selectedFilter()" (filterChange)="setFilter($event)" />
      }
    </div>
    <div class="flex-1 border-t border-gray-200 self-center min-w-0"></div>
    <!-- Carousel controls -->
    <div class="flex items-center gap-2 shrink-0">
      <button
        type="button"
        (click)="scrollShadowDirective()?.scrollLeft()"
        class="h-8 w-8 p-0 flex items-center justify-center rounded border border-gray-300 bg-white text-gray-600 hover:bg-gray-100 hover:border-gray-400 transition-colors"
        data-testid="dashboard-recent-progress-scroll-left"
        aria-label="Scroll left">
        <i class="fa-light fa-chevron-left"></i>
      </button>
      <button
        type="button"
        (click)="scrollShadowDirective()?.scrollRight()"
        class="h-8 w-8 p-0 flex items-center justify-center rounded border border-gray-300 bg-white text-gray-600 hover:bg-gray-100 hover:border-gray-400 transition-colors"
        data-testid="dashboard-recent-progress-scroll-right"
        aria-label="Scroll right">
        <i class="fa-light fa-chevron-right"></i>
      </button>
    </div>
  </div>

  <div class="relative overflow-hidden">
    <div lfxScrollShadow class="flex gap-4 overflow-x-auto pr-4 hide-scrollbar scroll-smooth" data-testid="dashboard-recent-progress-items">
      @for (item of filteredProgressItems(); track item.testId) {
        <lfx-metric-card
          [title]="item.title"
          [icon]="item.icon"
          [testId]="item.testId"
          [chartType]="item.chartType"
          [chartData]="item.chartData"
          [chartOptions]="item.chartOptions"
          [value]="item.value"
          [subtitle]="item.subtitle"
          [valueTooltip]="item.tooltipText"
          [loading]="!!item.loading"></lfx-metric-card>
      }
    </div>

    <!-- Right shadow fade -->
    <div
      class="absolute top-0 bottom-0 right-0 w-32 z-10 pointer-events-none bg-[linear-gradient(to_right,transparent,#f9fafb)] transition-opacity duration-200"
      [class.opacity-0]="!scrollShadowDirective()?.showRightShadow()"
      data-testid="dashboard-recent-progress-shadow-right"
      aria-hidden="true"></div>

    <!-- Left shadow fade -->
    <div
      class="absolute top-0 bottom-0 left-0 w-32 z-10 pointer-events-none bg-[linear-gradient(to_left,transparent,#f9fafb)] transition-opacity duration-200"
      [class.opacity-0]="!scrollShadowDirective()?.showLeftShadow()"
      data-testid="dashboard-recent-progress-shadow-left"
      aria-hidden="true"></div>
  </div>
</section>
