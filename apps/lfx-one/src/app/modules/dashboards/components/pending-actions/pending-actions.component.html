<section data-testid="dashboard-pending-actions-section">
  <!-- Section header with inline divider -->
  <div class="flex items-center gap-3 mb-6">
    <h2 class="flex items-center gap-2 shrink-0 text-base font-medium text-gray-900">
      <i class="fa-light fa-list-check text-lg"></i>
      <span>My Pending Actions</span>
    </h2>
    <div class="flex-1 border-t border-gray-200 self-center"></div>
  </div>

  @if (pendingActions().length > 0) {
    <!-- Unified card with divider rows -->
    <div
      class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden divide-y divide-gray-200"
      data-testid="dashboard-pending-actions-list">
      @for (item of pendingActions(); track $index) {
        <div
          class="flex items-center justify-between gap-4 px-4 py-3 bg-[rgba(255,251,235,0.5)]"
          [attr.data-testid]="'dashboard-pending-actions-item-' + item.type">
          <!-- Label + text -->
          <div class="flex items-center gap-3 min-w-0 flex-1">
            <lfx-tag
              class="shrink-0"
              [value]="item.type"
              [severity]="item.severity"
              [icon]="item.icon" />
            <p
              class="text-sm font-medium text-gray-900 truncate"
              [pTooltip]="item.text"
              data-testid="dashboard-pending-actions-title">
              {{ item.text }}
            </p>
          </div>
          <!-- Action button -->
          <div class="shrink-0">
            @if (item.buttonLink) {
              <lfx-button
                size="small"
                severity="secondary"
                [outlined]="true"
                rel="noopener noreferrer"
                [link]="true"
                [href]="item.buttonLink"
                target="_blank"
                (onClick)="handleActionClick(item)"
                [label]="item.buttonText" />
            } @else {
              <lfx-button
                size="small"
                severity="secondary"
                [outlined]="true"
                (onClick)="handleActionClick(item)"
                [label]="item.buttonText" />
            }
          </div>
        </div>
      }
    </div>
  } @else {
    <!-- Empty state -->
    <div
      class="bg-white rounded-2xl border border-gray-200 shadow-sm flex flex-col items-center py-12"
      data-testid="dashboard-pending-actions-empty">
      <i class="fa-light fa-eyes text-3xl text-gray-300 mb-3"></i>
      <p class="text-sm font-medium text-gray-600">No pending actions</p>
      <p class="text-xs text-gray-400 mt-1">You're all caught up!</p>
    </div>
  }
</section>
