<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [style]="{ width: '28rem' }"
  header="Edit Org Lens Access"
  styleClass="lfx-edit-access-role-modal">
  @if (user(); as person) {
    <div class="flex flex-col gap-5 py-1" data-testid="org-access-edit-modal">
      <!-- Person summary -->
      <div class="flex items-center gap-3">
        <span class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-blue-600 text-sm font-semibold text-white" aria-hidden="true">
          {{ person.initials }}
        </span>
        <div class="flex min-w-0 flex-col">
          <span class="truncate text-sm font-medium text-gray-900">{{ person.name }}</span>
          <span class="truncate text-xs text-gray-500">{{ person.email }}</span>
        </div>
      </div>

      <!-- Current access (read-only) -->
      <div class="flex flex-col gap-1.5">
        <span class="text-xs font-medium uppercase tracking-wide text-gray-500">Current Access</span>
        <span
          class="inline-flex w-fit items-center rounded-full border border-gray-300 bg-gray-100 px-2.5 py-0.5 text-xs font-semibold text-gray-700"
          data-testid="org-access-edit-current">
          {{ currentAccessLabel() }}
        </span>
      </div>

      <!-- Change to -->
      <div class="flex flex-col gap-1.5">
        <label for="org-access-change-to" class="text-xs font-medium uppercase tracking-wide text-gray-500">Change to</label>
        <p-select
          inputId="org-access-change-to"
          [options]="roleOptions()"
          [ngModel]="selectedRole()"
          (ngModelChange)="selectedRole.set($event)"
          optionLabel="label"
          optionValue="value"
          optionDisabled="disabled"
          [disabled]="saving()"
          styleClass="w-full"
          ariaLabel="Change access role"
          data-testid="org-access-edit-change-to" />
        @if (lastAdminNotice()) {
          <p class="text-xs text-gray-500" data-testid="org-access-edit-last-admin-notice">
            This is the organization's only Admin. Promote another Admin before changing this role.
          </p>
        }
      </div>

      <!-- Footer -->
      <div class="mt-1 flex items-center justify-end gap-3">
        <button
          type="button"
          class="text-sm font-medium text-blue-600 hover:text-blue-700 disabled:cursor-not-allowed disabled:text-gray-400"
          [disabled]="saving()"
          data-testid="org-access-edit-cancel"
          (click)="onCancel()">
          Cancel
        </button>
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-md border border-blue-600 bg-blue-600 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
          [disabled]="!canSave()"
          data-testid="org-access-edit-save"
          (click)="onSave()">
          @if (saving()) {
            <i class="fa-light fa-spinner fa-spin" aria-hidden="true"></i>
          }
          <span>{{ saving() ? 'Saving…' : 'Save Changes' }}</span>
        </button>
      </div>
    </div>
  }
</p-dialog>
