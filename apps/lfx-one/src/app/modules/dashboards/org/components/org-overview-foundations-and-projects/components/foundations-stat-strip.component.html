<div class="bg-white border border-gray-200 rounded-lg overflow-hidden" data-testid="org-overview-foundations-and-projects-stat-strip">
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4">
    <!-- Foundations (violet) -->
    <div
      class="flex items-center gap-3 p-4 border-gray-200 border-b md:border-r xl:border-b-0"
      data-testid="org-overview-foundations-and-projects-stat-strip-tile-foundations">
      <span class="inline-flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-violet-100 text-violet-700">
        <i class="fa-light fa-building-columns text-sm" aria-hidden="true"></i>
      </span>
      <div class="flex min-w-0 flex-col">
        <div class="text-2xl font-semibold leading-none text-gray-900">{{ foundationsTotal() }}</div>
        <div class="mt-1 text-xs font-medium text-gray-600">Foundations</div>
        <div class="mt-1 text-[11px] leading-snug text-gray-500">{{ foundationsDetail() }}</div>
      </div>
    </div>

    <!-- Projects (blue) -->
    <div
      class="flex items-center gap-3 p-4 border-gray-200 border-b xl:border-r xl:border-b-0"
      data-testid="org-overview-foundations-and-projects-stat-strip-tile-projects">
      <span class="inline-flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-blue-100 text-blue-700">
        <i class="fa-light fa-code text-sm" aria-hidden="true"></i>
      </span>
      <div class="flex min-w-0 flex-col">
        <div class="text-2xl font-semibold leading-none text-gray-900">{{ projectsTotal() }}</div>
        <div class="mt-1 text-xs font-medium text-gray-600">Projects</div>
        <div class="mt-1 text-[11px] leading-snug text-gray-500">{{ projectsDetail() }}</div>
      </div>
    </div>

    <!-- Governance Roles (emerald) -->
    <div
      class="flex items-center gap-3 p-4 border-gray-200 border-b md:border-r md:border-b-0"
      data-testid="org-overview-foundations-and-projects-stat-strip-tile-governance">
      <span class="inline-flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-emerald-100 text-emerald-700">
        <i class="fa-light fa-users text-sm" aria-hidden="true"></i>
      </span>
      <div class="flex min-w-0 flex-col">
        <div class="text-2xl font-semibold leading-none text-gray-900">{{ governanceTotal() }}</div>
        <div class="mt-1 text-xs font-medium text-gray-600">Governance Roles</div>
        <div class="mt-1 text-[11px] leading-snug text-gray-500">{{ governanceDetail() }}</div>
      </div>
    </div>

    <!-- Meetings This Week (gray) -->
    <div
      class="flex items-center gap-3 p-4"
      data-testid="org-overview-foundations-and-projects-stat-strip-tile-meetings">
      <span class="inline-flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-gray-200 text-gray-600">
        <i class="fa-light fa-calendar text-sm" aria-hidden="true"></i>
      </span>
      <div class="flex min-w-0 flex-col">
        <div class="text-2xl font-semibold leading-none text-gray-900">{{ meetingsTotal() }}</div>
        <div class="mt-1 text-xs font-medium text-gray-600">Meetings This Week</div>
        <div class="mt-1 text-[11px] leading-snug text-gray-500">{{ meetingsDetail() }}</div>
      </div>
    </div>
  </div>
</div>
