<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="true"
  [dismissableMask]="true"
  [closeOnEscape]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '440px', 'max-width': '90vw' }"
  styleClass="why-cant-edit-dialog"
  (onHide)="onHide()"
  [showHeader]="false">
  <div class="flex flex-col items-center gap-4 px-4 pb-4 pt-6" data-testid="why-cant-edit-modal">
    <i class="fa-light fa-circle-info text-3xl text-blue-500" data-testid="why-cant-edit-icon" aria-hidden="true"></i>
    <h3 class="text-center text-lg font-semibold text-gray-900" data-testid="why-cant-edit-title">Why can't I edit this member?</h3>
    <p class="text-center text-sm text-gray-600" data-testid="why-cant-edit-reason">
      {{ displayedReason() }}
    </p>
    <div class="mt-2 flex w-full items-center justify-end gap-3">
      <button
        type="button"
        class="text-sm font-medium text-blue-600 hover:text-blue-700"
        data-testid="why-cant-edit-contact-foundation"
        (click)="onContactFoundation()">
        Contact Foundation
      </button>
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
        data-testid="why-cant-edit-got-it"
        (click)="onGotIt()">
        Got it
      </button>
    </div>
  </div>
</p-dialog>
