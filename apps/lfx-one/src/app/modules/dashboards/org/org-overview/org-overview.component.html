<main class="flex flex-col gap-6 p-6" data-testid="org-overview-page">
  <header class="flex flex-col gap-1 md:flex-row md:items-center md:gap-3" data-testid="org-overview-header">
    <h1 class="text-xl font-semibold text-gray-900" data-testid="org-overview-title">{{ companyName() }} Overview</h1>
    @if (tierLabel(); as tier) {
      <lfx-tag [value]="tier" severity="secondary" icon="fa-light fa-star" [rounded]="true" styleClass="text-xs" data-testid="org-overview-tier-badge" />
    }
  </header>

  <!-- Organization Involvement Section -->
  @defer (on viewport) {
    <lfx-org-overview-involvement />
  } @placeholder {
    <section data-testid="organization-involvement-placeholder">
      <div class="flex flex-wrap gap-3 items-end justify-between mb-4">
        <div class="flex flex-col gap-3">
          <p-skeleton width="14rem" height="1.5rem" />
          <p-skeleton width="16rem" height="1.5rem" />
        </div>
        <div class="flex items-center gap-2">
          <p-skeleton width="2rem" height="2rem" borderRadius="4px" />
          <p-skeleton width="2rem" height="2rem" borderRadius="4px" />
        </div>
      </div>
      <div class="flex gap-4 overflow-hidden">
        @for (i of [1, 2, 3]; track i) {
          <div class="p-4 bg-white border border-gray-200 rounded-lg flex-shrink-0 w-[calc(100vw-3rem)] md:w-80">
            <div class="flex flex-col gap-2">
              <div class="flex items-center gap-2">
                <p-skeleton width="1rem" height="1rem" borderRadius="4px" />
                <p-skeleton width="6rem" height="0.875rem" />
              </div>
              <div class="mt-3 w-full h-16">
                <p-skeleton width="100%" height="100%" borderRadius="8px" />
              </div>
              <div class="flex flex-col gap-1 mt-auto">
                <p-skeleton width="3rem" height="1.75rem" />
                <p-skeleton width="70%" height="0.75rem" />
              </div>
            </div>
          </div>
        }
      </div>
    </section>
  }

  <!-- Foundations and Projects Section -->
  @defer (on viewport) {
    <lfx-org-overview-foundations-and-projects />
  } @placeholder {
    <section data-testid="org-overview-foundations-and-projects-placeholder" class="flex flex-col gap-4">
      <div class="flex items-center justify-between">
        <p-skeleton width="20rem" height="1.5rem" />
        <p-skeleton width="14rem" height="1rem" />
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        @for (i of [1, 2, 3, 4]; track i) {
          <div class="p-4 bg-white border border-gray-200 rounded-lg flex flex-col gap-2">
            <p-skeleton width="2rem" height="2rem" borderRadius="9999px" />
            <p-skeleton width="3rem" height="1.75rem" />
            <p-skeleton width="80%" height="0.75rem" />
          </div>
        }
      </div>
    </section>
  }
</main>
