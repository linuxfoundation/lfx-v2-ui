@switch (dashboardType()) {
  @case ('contributor') {
    <lfx-contributor-dashboard />
  }
  @case ('maintainer') {
    <lfx-maintainer-dashboard />
  }
  @case ('board-member') {
    <lfx-board-member-dashboard />
  }
  @case ('executive-director') {
    <lfx-executive-director-dashboard />
  }
}
