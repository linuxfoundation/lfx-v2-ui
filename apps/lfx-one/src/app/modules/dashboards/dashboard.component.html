@switch (activeLens()) {
  @case ('me') {
    <lfx-user-dashboard />
  }
  @case ('project') {
    <lfx-project-dashboard />
  }
  @case ('foundation') {
    @if (foundationDashboardType() === 'executive-director') {
      <lfx-executive-director-dashboard />
    } @else {
      <lfx-board-member-dashboard />
    }
  }
  @case ('org') {
    <lfx-board-member-dashboard />
  }
}
