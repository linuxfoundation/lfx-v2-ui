<div class="container mx-auto px-4 sm:px-6 lg:px-8" data-testid="foundation-event-dashboard">
  <div class="flex flex-col gap-6">
    <!-- Page Header -->
    <div class="flex items-start justify-between mt-3">
      <div class="flex flex-col gap-1">
        <h1 class="font-display font-light text-2xl" data-testid="foundation-event-page-title">Events</h1>
      </div>
      <lfx-discover-events-button testId="foundation-event-discover-button" />
    </div>

    <!-- Search and Filters -->
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <lfx-events-top-bar
        [showRoleFilter]="false"
        [statusOptions]="foundationStatusOptions"
        (searchQueryChange)="onSearchQueryChange($event)"
        (statusChange)="onStatusChange($event)" />
    </div>

    <!-- Events List (Tabs + Table) -->
    <lfx-foundation-events-list [foundation]="userFoundation()" [searchQuery]="selectedSearchQuery()" [status]="selectedStatus()" />
  </div>
</div>
