<div class="flex flex-col" data-testid="visa-request-application-dialog">
  <!-- Step indicator -->
  <lfx-step-indicator [stepStates]="stepStates()" testIdPrefix="visa-request" />

  <!-- Step content -->
  @if (step() === 'select-event') {
    <div class="scroll-area overflow-y-auto pr-1">
      <lfx-event-selection [(selectedEvent)]="selectedEvent" />
    </div>
  } @else if (step() === 'terms') {
    <lfx-visa-request-terms />
  } @else if (step() === 'apply') {
    <lfx-visa-request-apply-form (formValidityChange)="applyFormValid.set($event)" (formChange)="applicantData.set($event)" />
  }

  <!-- Footer -->
  <div class="mt-5 flex items-center justify-between border-t border-gray-100 pt-4" data-testid="visa-request-footer">
    <button type="button" class="text-sm font-medium text-gray-500 hover:text-gray-700" (click)="onCancel()" data-testid="visa-request-cancel">Cancel</button>
    <div class="flex items-center gap-2">
      @if (step() !== 'select-event') {
        <lfx-button label="Previous Step" [outlined]="true" size="small" (onClick)="onPreviousStep()" data-testid="visa-request-previous-step" />
      }
      @if (step() === 'terms') {
        <lfx-button label="I Agree" severity="primary" size="small" (onClick)="onNextStep()" data-testid="visa-request-agree" />
      } @else if (step() === 'apply') {
        <lfx-button
          label="Submit Application"
          severity="primary"
          size="small"
          [disabled]="isNextDisabled() || submitting()"
          [loading]="submitting()"
          (onClick)="onSubmitApplication()"
          data-testid="visa-request-submit" />
      } @else {
        <lfx-button
          label="Next Step"
          severity="primary"
          size="small"
          [disabled]="isNextDisabled()"
          (onClick)="onNextStep()"
          data-testid="visa-request-next-step" />
      }
    </div>
  </div>
</div>
