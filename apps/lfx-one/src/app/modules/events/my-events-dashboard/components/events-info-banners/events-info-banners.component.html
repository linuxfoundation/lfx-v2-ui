<div class="flex flex-col gap-3" data-testid="events-info-banners">
  <!-- Registration delay notice -->
  <lfx-message severity="info" size="small" icon="fa-light fa-clock" data-testid="events-registration-delay-banner">
    <span class="text-blue-700 font-normal">
      Event registrations might take a while to show up. Just registered? It may take up to 1 hour to appear in your list.
    </span>
  </lfx-message>

  <!-- Discover events prompt -->
  <lfx-message severity="info" size="small" icon="fa-light fa-compass" data-testid="events-discover-banner">
    <div class="flex items-center gap-2">
      <span class="text-blue-700 font-normal">Looking for more events?</span>
      <a
        [href]="discoverUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-1 font-medium underline hover:no-underline"
        data-testid="events-discover-link">
        Discover events across LF foundations
      </a>
    </div>
  </lfx-message>
</div>
