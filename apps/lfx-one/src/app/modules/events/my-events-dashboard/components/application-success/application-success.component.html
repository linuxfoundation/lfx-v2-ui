<div class="flex flex-col items-center gap-5 py-12 text-center" data-testid="application-success">
  <!-- Green checkmark circle -->
  <div class="flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
    <i class="fas fa-check text-3xl text-green-600"></i>
  </div>

  <!-- Title -->
  <h2 class="text-xl font-bold text-gray-900" data-testid="application-success-title">{{ title() }}</h2>

  <!-- Body -->
  <p class="max-w-md text-sm leading-relaxed text-gray-500" data-testid="application-success-body">
    Your application for <strong class="font-semibold text-blue-600">{{ eventName() }}</strong> has been submitted. You will receive an email confirmation
    shortly. Processing typically takes 5–10 business days.
  </p>
</div>
