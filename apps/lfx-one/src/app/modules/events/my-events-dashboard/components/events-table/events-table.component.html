<lfx-table
  [value]="eventsResponse().data"
  [loading]="loading()"
  [lazy]="true"
  [paginator]="eventsResponse().total > 0"
  [rows]="eventsResponse().pageSize"
  [first]="eventsResponse().offset"
  [totalRecords]="eventsResponse().total"
  [rowsPerPageOptions]="rppOptions()"
  [showCurrentPageReport]="true"
  [showFirstLastIcon]="false"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
  paginatorPosition="bottom"
  selectionMode="single"
  (onPage)="onPageChange($event)"
  (onRowSelect)="onTableRowSelect($event)"
  data-testid="events-data-table">
  <ng-template #header>
    <tr>
      <th
        scope="col"
        [attr.aria-sort]="sortField() === 'EVENT_NAME' ? (sortOrder() === 'ASC' ? 'ascending' : 'descending') : 'none'"
        data-testid="sort-event-name">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('EVENT_NAME')">
          Event Name <i [class]="sortIcons()['EVENT_NAME']"></i>
        </button>
      </th>
      <th
        scope="col"
        [attr.aria-sort]="sortField() === 'PROJECT_NAME' ? (sortOrder() === 'ASC' ? 'ascending' : 'descending') : 'none'"
        data-testid="sort-foundation">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('PROJECT_NAME')">
          Foundation <i [class]="sortIcons()['PROJECT_NAME']"></i>
        </button>
      </th>
      <th
        scope="col"
        [attr.aria-sort]="sortField() === 'EVENT_START_DATE' ? (sortOrder() === 'ASC' ? 'ascending' : 'descending') : 'none'"
        data-testid="sort-date">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('EVENT_START_DATE')">
          Date <i [class]="sortIcons()['EVENT_START_DATE']"></i>
        </button>
      </th>
      <th
        scope="col"
        [attr.aria-sort]="sortField() === 'EVENT_CITY' ? (sortOrder() === 'ASC' ? 'ascending' : 'descending') : 'none'"
        data-testid="sort-location">
        <button
          type="button"
          class="flex cursor-pointer select-none items-center gap-1 text-xs text-gray-500 font-medium"
          (click)="onHeaderClick('EVENT_CITY')">
          Location <i [class]="sortIcons()['EVENT_CITY']"></i>
        </button>
      </th>
      <th>Role</th>
      <th>Status</th>
      @if (isPastEvents()) {
        <th></th>
      }
      @if (!isPastEvents()) {
        <th></th>
      }
    </tr>
  </ng-template>

  <ng-template #body let-event let-rowIndex="rowIndex">
    <tr [attr.data-row-index]="rowIndex" [attr.data-testid]="'event-row-' + event.id">
      <!-- Event Name -->
      <td>
        <span class="text-sm font-medium text-gray-900" [attr.data-testid]="'event-name-' + event.id">
          {{ event.name }}
        </span>
      </td>

      <!-- Foundation -->
      <td>
        <lfx-tag [value]="event.foundation" styleClass="tag-neutral" [attr.data-testid]="'event-foundation-' + event.id" />
      </td>

      <!-- Date -->
      <td>
        <span class="text-sm text-gray-700">{{ event.date }}</span>
      </td>

      <!-- Location -->
      <td>
        <span class="text-sm text-gray-700">{{ event.location }}</span>
      </td>

      <!-- Role -->
      <td>
        @if (event.role) {
          <lfx-tag [value]="event.role" styleClass="tag-neutral" [attr.data-testid]="'event-role-' + event.id" />
        } @else {
          <span class="text-xs text-gray-400">—</span>
        }
      </td>

      <!-- Status -->
      <td>
        <lfx-tag [value]="event.status" [severity]="statusSeverityMap[event.status] ?? 'info'" [attr.data-testid]="'event-status-' + event.id" />
      </td>

      <!-- Certificate -->
      @if (isPastEvents()) {
        <td>
          <div class="flex justify-end">
            <lfx-button
              label="Download Certificate"
              severity="primary"
              [outlined]="true"
              size="small"
              styleClass="whitespace-nowrap"
              (onClick)="$event.stopPropagation(); downloadCertificate(event.id)"
              [attr.data-testid]="'event-download-certificate-button-' + event.id" />
          </div>
        </td>
      }

      <!-- Action -->
      @if (!isPastEvents()) {
        <td>
          <div class="flex justify-end">
            @if (!event.isRegistered && event.registrationUrl) {
              <lfx-button
                label="Register"
                icon="fa-light fa-ticket"
                severity="primary"
                [outlined]="true"
                size="small"
                styleClass="whitespace-nowrap w-[112px]"
                (onClick)="$event.stopPropagation(); openUrl(event.registrationUrl!)"
                [attr.data-testid]="'event-register-button-' + event.id" />
            }
          </div>
        </td>
      }
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="7" class="text-center py-10">
        <div class="flex items-center justify-center p-16">
          <div class="text-center max-w-md">
            <div class="text-gray-400 mb-4">
              <i class="fa-light fa-eyes text-3xl mb-4"></i>
              <h3 class="text-gray-600 mt-2">No events found</h3>
            </div>
          </div>
        </div>
      </td>
    </tr>
  </ng-template>
</lfx-table>
