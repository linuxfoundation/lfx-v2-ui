<div class="container mx-auto px-4 sm:px-6 lg:px-8" data-testid="my-events-dashboard">
  <div class="flex flex-col gap-6">
    <!-- Page Header -->
    <div class="flex items-start justify-between mt-3">
      <div>
        <h1 class="font-display font-light text-2xl" data-testid="my-events-page-title">My Events</h1>
        <p class="mt-1 text-sm text-gray-500" data-testid="my-events-description">Events you are registered to attend across all foundations.</p>
      </div>
      <div class="flex items-center gap-6">
        <span
          class="flex items-center gap-1.5 text-sm text-gray-600 cursor-help"
          tabindex="0"
          role="note"
          aria-describedby="my-events-registration-delay-description"
          pTooltip="Event registrations might take a while to show up. Just registered? It may take up to 1 hour to appear in your list."
          tooltipPosition="bottom"
          appendTo="body"
          data-testid="my-events-registration-delay-hint">
          <i class="fa-light fa-face-monocle text-lg" aria-hidden="true"></i>
          <span class="underline decoration-dotted">Can't see your registered event?</span>
        </span>
        <span id="my-events-registration-delay-description" class="sr-only">Event registrations might take a while to show up. Just registered? It may take up to 1 hour to appear in your list.</span>
        <lfx-discover-events-button testId="my-events-discover-button" />
      </div>
    </div>

    <!-- Search and Filters -->
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <lfx-events-top-bar
        [isFoundationFilter]="!isRequestTab()"
        [showRoleFilter]="!isRequestTab()"
        [isPast]="isPast()"
        [statusOptions]="currentStatusOptions()"
        (searchQueryChange)="onSearchQueryChange($event)"
        (foundationChange)="onFoundationChange($event)"
        (roleChange)="onRoleChange($event)"
        (statusChange)="onStatusChange($event)" />
    </div>
    <!-- Events List (Tabs + Table) -->
    <lfx-events-list
      [foundation]="selectedFoundation()"
      [searchQuery]="selectedSearchQuery()"
      [role]="selectedRole()"
      [status]="selectedStatus()"
      (activeTabChange)="onActiveTabChange($event)" />
  </div>
</div>
