<div class="container mx-auto px-4 sm:px-6 lg:px-8" data-testid="my-events-dashboard">
  <div class="flex flex-col gap-6">
    <!-- Page Header -->
    <div class="flex items-start justify-between mt-[12px] mb-[24px]">
      <div>
        <h1 class="font-display font-light text-2xl" data-testid="my-events-page-title">My Events</h1>
        <p class="mt-1 text-sm text-gray-500" data-testid="my-events-description">Events you are registered to attend across all foundations.</p>
        <lfx-tag [value]="foundationLabel()" severity="info" styleClass="mt-1" />
      </div>
      <lfx-discover-events-button testId="my-events-discover-button" />
    </div>

    <!-- Info Banners -->
    <lfx-events-info-banners [discoverUrl]="linksConfig.EVENTS.DISCOVER" />

    <!-- Search and Filters -->
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <lfx-events-top-bar
        [isFoundationFilter]="true"
        [isPast]="isPast()"
        (searchQueryChange)="onSearchQueryChange($event)"
        (foundationChange)="onFoundationChange($event)"
        (roleChange)="onRoleChange($event)"
        (statusChange)="onStatusChange($event)" />
    </div>
    <!-- Events List (Tabs + Table) -->
    <lfx-events-list
      [foundation]="selectedFoundation()"
      [searchQuery]="selectedSearchQuery()"
      [role]="selectedRole()"
      [status]="selectedStatus()"
      (activeTabChange)="onActiveTabChange($event)" />
  </div>
</div>
