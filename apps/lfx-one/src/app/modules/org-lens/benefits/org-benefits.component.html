<div class="container mx-auto" data-testid="ospo-resources-container">
  <div class="mb-6">
    <h1>OSPO Resources</h1>
    <p class="mt-1 text-sm text-gray-500">Guides, tools, and best practices for running an effective Open Source Program Office.</p>
  </div>

  <!-- Card grid -->
  <div class="bg-white rounded-lg border border-gray-200 p-7 mb-6" data-testid="ospo-cards">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      @for (card of cards; track card.title) {
        <div class="border border-gray-200 rounded-lg p-5 flex flex-col gap-3 hover:shadow-sm transition-shadow">
          <div class="text-sm font-semibold text-gray-900">{{ card.title }}</div>
          <p class="text-sm text-gray-500 leading-relaxed flex-1">{{ card.description }}</p>
          <lfx-button label="Learn More" severity="info" size="small"></lfx-button>
        </div>
      }
    </div>
  </div>

  <!-- Key Documentation -->
  <div class="bg-white rounded-lg border border-gray-200 p-7" data-testid="ospo-key-docs">
    <div class="text-base font-bold text-gray-900 mb-5">Key Documentation</div>
    <div class="flex flex-col divide-y divide-gray-100">
      @for (doc of keyDocs; track doc.title) {
        <div class="py-3.5">
          <a class="text-sm font-semibold text-blue-500 hover:text-blue-600 cursor-pointer">{{ doc.title }}</a>
          <div class="text-xs text-gray-500 mt-1">{{ doc.description }}</div>
        </div>
      }
    </div>
  </div>
</div>
