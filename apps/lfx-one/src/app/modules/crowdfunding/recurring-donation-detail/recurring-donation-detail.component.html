<div class="flex flex-col gap-6 p-8" data-testid="recurring-donation-detail">
  <!-- Back button -->
  <lfx-button
    label="Back to My Donations"
    icon="fa-light fa-chevron-left"
    severity="secondary"
    size="small"
    [text]="true"
    routerLink="/crowdfunding/donations"
    styleClass="self-start"
    data-testid="recurring-detail-back-btn" />

  @if (donation(); as d) {
    <lfx-recurring-donation-initiative-header [donation]="d" />

    <lfx-recurring-donation-subscription-summary
      [donation]="d"
      (changeAmount)="onChangeAmount()"
      (pauseDonation)="onPauseDonation()"
      (resumeDonation)="onResumeDonation()"
      (cancelDonation)="onCancelDonation()" />

    <lfx-recurring-donation-charge-history [chargeHistory]="chargeHistory()" [hasMore]="chargeHistoryHasMore()" (loadMore)="onLoadMore()" />
  } @else if (donation() === undefined) {
    <!-- Not found — only shown after the fetch completes with no match -->
    <div class="flex items-center justify-center py-16 text-sm text-gray-400" data-testid="not-found-state">Recurring donation not found.</div>
  }
  <!-- null = loading; no spinner yet, content renders once donation resolves -->
</div>
