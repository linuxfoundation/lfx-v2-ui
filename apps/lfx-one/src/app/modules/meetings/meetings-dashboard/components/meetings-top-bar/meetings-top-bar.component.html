<div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
  <!-- Time Filter Pills -->
  <lfx-filter-pills [options]="timeTabOptions" [selectedFilter]="timeFilter()" (filterChange)="onTimeTabChange($event)" data-testid="time-filter-tabs" />

  <!-- Pending RSVP Filter Pills (Me lens, upcoming only) -->
  @if (showPendingRsvpFilter()) {
    <lfx-filter-pills
      [options]="pendingRsvpPillOptions"
      [selectedFilter]="pendingRsvpOnly() ? 'pending' : ''"
      (filterChange)="onPendingRsvpPillChange()"
      data-testid="pending-rsvp-filter-pills" />
  }

  <!-- Search Input -->
  <div class="flex-1">
    <lfx-input-text
      [form]="searchForm"
      control="search"
      placeholder="Search meetings..."
      icon="fa-light fa-search"
      styleClass="w-full"
      size="small"
      data-testid="meetings-search-input"></lfx-input-text>
  </div>

  <!-- Foundation Filter Dropdown -->
  @if (showFoundationFilter()) {
    <div class="w-full sm:w-48">
      <lfx-select
        [form]="searchForm"
        control="foundationFilter"
        size="small"
        [options]="foundationOptions()"
        styleClass="w-full"
        (onChange)="onFoundationFilterChange($event.value)"
        data-testid="foundation-filter-dropdown"></lfx-select>
    </div>
  }

  <!-- Project Filter Dropdown -->
  @if (showProjectFilter()) {
    <div class="w-full sm:w-48">
      <lfx-select
        [form]="searchForm"
        control="projectFilter"
        size="small"
        [options]="projectOptions()"
        styleClass="w-full"
        (onChange)="onProjectFilterChange($event.value)"
        data-testid="project-filter-dropdown"></lfx-select>
    </div>
  }

  <!-- Meeting Type Filter Dropdown -->
  <div class="w-full sm:w-64">
    <lfx-select
      [form]="searchForm"
      control="meetingType"
      size="small"
      [options]="meetingTypeOptions()"
      placeholder="Select Type"
      [showClear]="true"
      styleClass="w-full"
      (onChange)="onMeetingTypeChange($event.value)"
      data-testid="meeting-type-filter"></lfx-select>
  </div>
</div>
