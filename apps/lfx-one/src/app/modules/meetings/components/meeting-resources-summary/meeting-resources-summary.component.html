<div class="pb-4">
  <!-- Step Title -->
  <div class="mb-6">
    <div class="flex items-center gap-3">
      <h2 class="font-normal">Resources & Links</h2>
      <span class="inline-flex items-center gap-1 text-xs font-medium text-gray-400 bg-gray-100 border border-gray-200 px-2.5 py-1 rounded-full">
        <i class="fa-light fa-clock text-[10px]"></i>
        Coming Soon
      </span>
    </div>
    <p class="text-sm text-gray-500 mt-1">Share documents, agendas, and reference materials so participants come prepared</p>
  </div>

  <!-- Disabled content overlay -->
  <div class="relative">
    <div class="opacity-40 pointer-events-none select-none" aria-disabled="true">
      <!-- Two Column Layout -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Upload Files Section - Left Column -->
        <div class="flex flex-col gap-4">
          <h4 class="text-neutral-950">Upload Files</h4>

          <lfx-file-upload
            [multiple]="true"
            [accept]="acceptString"
            [maxFileSize]="10485760"
            (onSelect)="onFileSelect($event)"
            [customUpload]="true"
            dataTest="meeting-attachment-upload"
            [showUploadButton]="false"
            [showCancelButton]="false"
            chooseLabel="Click to upload files or drag and drop">
          </lfx-file-upload>
        </div>

        <!-- Add Important Links Section - Right Column -->
        <div class="flex flex-col gap-4">
          <h4 class="text-neutral-950">Add Links</h4>

          <div class="flex flex-col gap-3">
            <input placeholder="Link title (e.g., Project Repository)" class="w-full h-10 px-3 py-2 text-sm border border-gray-200 rounded-lg" disabled />
            <div class="flex items-center gap-3">
              <input placeholder="https://github.com/your-project/repo" class="flex-1 h-10 px-3 py-2 text-sm border border-gray-200 rounded-lg" disabled />
              <lfx-button [disabled]="true" icon="fa-light fa-plus" size="small" data-testid="add-link-btn"> </lfx-button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
