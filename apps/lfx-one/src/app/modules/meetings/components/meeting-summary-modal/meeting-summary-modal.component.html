<div class="flex flex-col gap-4">
  <!-- Title -->
  @if (hasTitle) {
    <p class="text-sm text-gray-500" data-testid="summary-title">AI-generated meeting summary</p>
  }

  <!-- Status -->
  <div class="flex items-center gap-2" data-testid="summary-status">
    @if (approved) {
      <span class="text-xs font-medium text-emerald-600 bg-emerald-100 px-2 py-1 rounded-full"> <i class="fa-light fa-circle-check mr-1"></i>Approved </span>
    } @else {
      <span class="text-xs font-medium text-amber-600 bg-amber-100 px-2 py-1 rounded-full"> <i class="fa-light fa-clock mr-1"></i>Pending Review </span>
    }
  </div>

  <!-- Content -->
  @if (isStructured) {
    <div class="flex flex-col gap-4" data-testid="summary-structured">
      @for (section of sections; track $index) {
        <div class="border-l-4 pl-4 py-2" [ngClass]="section.borderColor" [attr.data-testid]="'summary-section-' + $index">
          <div class="flex items-center gap-2 mb-2">
            <i [ngClass]="[section.icon, section.iconColor]" class="text-sm"></i>
            <h3 class="text-sm font-semibold text-gray-800">{{ section.heading }}</h3>
          </div>
          <lfx-markdown-renderer [content]="section.content"></lfx-markdown-renderer>
        </div>
      }
    </div>
  } @else {
    <lfx-markdown-renderer [content]="content" data-testid="summary-content"></lfx-markdown-renderer>
  }
</div>
