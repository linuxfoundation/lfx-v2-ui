<div class="flex flex-col gap-4 pt-2" data-testid="committee-votes-tab">
  @if (loading() || votes().length > 0) {
    <lfx-votes-table
      [votes]="votes()"
      [hasPMOAccess]="canEdit()"
      [loading]="loading()"
      [totalRecords]="votes().length"
      (viewResults)="viewVoteResults($event)"
      (viewVote)="viewVoteResults($event)">
      @if (canEdit()) {
        <lfx-button
          tableActions
          label="Create Vote"
          icon="fa-light fa-check-to-slot"
          severity="info"
          size="small"
          [routerLink]="['/votes', 'create']"
          [queryParams]="{ committee_uid: committee().uid }"
          data-testid="committee-votes-create-btn"></lfx-button>
      }
    </lfx-votes-table>
  } @else {
    @if (canEdit()) {
      <div class="flex items-center justify-end">
        <lfx-button
          label="Create Vote"
          icon="fa-light fa-check-to-slot"
          severity="info"
          size="small"
          [routerLink]="['/votes', 'create']"
          [queryParams]="{ committee_uid: committee().uid }"
          data-testid="committee-votes-empty-create-btn"></lfx-button>
      </div>
    }
    <lfx-empty-state
      icon="fa-light fa-check-to-slot"
      title="No votes yet"
      subtitle="Votes for this committee will appear here.">
    </lfx-empty-state>
  }

  <lfx-vote-results-drawer [(visible)]="resultsDrawerVisible" [voteId]="selectedVoteId()" [listVote]="selectedVote()"> </lfx-vote-results-drawer>
</div>
