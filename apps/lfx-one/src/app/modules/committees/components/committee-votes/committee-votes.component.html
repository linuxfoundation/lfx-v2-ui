<div class="flex flex-col gap-4 pt-4" data-testid="committee-votes-tab">
  <!-- Sticky Top Bar -->
  <div class="sticky top-0 md:top-6 z-10 bg-white rounded-lg shadow-md p-4">
    <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
      <!-- Search Input -->
      <div class="flex-1">
        <lfx-input-text
          [form]="searchForm"
          control="search"
          placeholder="Search votes..."
          icon="fa-light fa-search"
          styleClass="w-full"
          size="small"
          dataTest="committee-votes-search"></lfx-input-text>
      </div>

      <!-- Create Vote button -->
      @if (canEdit()) {
        <lfx-button
          label="Create Vote"
          icon="fa-light fa-check-to-slot"
          severity="info"
          size="small"
          [routerLink]="['/votes', 'create']"
          [queryParams]="{ committee_uid: committee().uid }"
          data-testid="committee-votes-create-btn"></lfx-button>
      }
    </div>
  </div>

  @if (loading() || filteredVotes().length > 0) {
    <lfx-votes-table
      [votes]="filteredVotes()"
      [hasPMOAccess]="canEdit()"
      [loading]="loading()"
      [totalRecords]="filteredVotes().length"
      (viewResults)="viewVoteResults($event)"
      (viewVote)="viewVoteResults($event)">
    </lfx-votes-table>
  } @else if (votes().length > 0) {
    <!-- No search results -->
    <lfx-card>
      <div class="flex flex-col items-center py-12">
        <i class="fa-light fa-search text-3xl text-gray-300 mb-3" aria-hidden="true"></i>
        <p class="text-sm font-medium text-gray-500">No matching votes</p>
        <p class="text-xs text-gray-400 mt-1">Try adjusting your search query.</p>
      </div>
    </lfx-card>
  } @else {
    <lfx-card>
      <div class="flex flex-col items-center py-12">
        <i class="fa-light fa-check-to-slot text-3xl text-surface-300 mb-3" aria-hidden="true"></i>
        <p class="text-sm font-medium text-muted-color">No votes yet</p>
        <p class="text-xs text-surface-400 mt-1">Votes for this committee will appear here.</p>
      </div>
    </lfx-card>
  }

  <lfx-vote-results-drawer [(visible)]="resultsDrawerVisible" [voteId]="selectedVoteId()" [listVote]="selectedVote()"> </lfx-vote-results-drawer>
</div>
