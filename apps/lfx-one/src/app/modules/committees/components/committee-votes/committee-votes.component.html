<div class="flex flex-col gap-4 pt-4" data-testid="committee-votes-tab">
  @if (votes().length > 0) {
    <lfx-votes-table [votes]="votes()" [hasPMOAccess]="canEdit()" [loading]="loading()" [totalRecords]="votes().length" (viewResults)="viewVoteResults($event)">
    </lfx-votes-table>
  } @else if (!loading()) {
    <lfx-card>
      <div class="flex flex-col items-center py-12">
        <i class="fa-light fa-check-to-slot text-3xl text-gray-300 mb-3"></i>
        <p class="text-sm font-medium text-gray-600">No votes</p>
        <p class="text-xs text-gray-400 mt-1">Votes for this group will appear here.</p>
      </div>
    </lfx-card>
  }

  <lfx-vote-results-drawer [(visible)]="resultsDrawerVisible" [voteId]="selectedVoteId()" [listVote]="selectedVote()"> </lfx-vote-results-drawer>
</div>
