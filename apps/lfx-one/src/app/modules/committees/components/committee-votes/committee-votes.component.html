<div class="flex flex-col gap-4 pt-4" data-testid="committee-votes-tab">
  <!-- Header with Create button -->
  @if (canEdit()) {
    <div class="flex items-center justify-end">
      <lfx-button
        label="Create Vote"
        icon="fa-light fa-check-to-slot"
        severity="info"
        size="small"
        [routerLink]="['/votes', 'create']"
        [queryParams]="{ committee_uid: committee().uid }"
        data-testid="committee-votes-create-btn"></lfx-button>
    </div>
  }

  @if (loading() || votes().length > 0) {
    <lfx-votes-table
      [votes]="votes()"
      [hasPMOAccess]="canEdit()"
      [loading]="loading()"
      [totalRecords]="votes().length"
      (viewResults)="viewVoteResults($event)"
      (viewVote)="viewVoteResults($event)">
    </lfx-votes-table>
  } @else {
    <lfx-card>
      <div class="flex flex-col items-center py-12">
        <i class="fa-light fa-check-to-slot text-3xl text-surface-300 mb-3" aria-hidden="true"></i>
        <p class="text-sm font-medium text-muted-color">No votes yet</p>
        <p class="text-xs text-surface-400 mt-1">Votes for this committee will appear here.</p>
      </div>
    </lfx-card>
  }

  <lfx-vote-results-drawer [(visible)]="resultsDrawerVisible" [voteId]="selectedVoteId()" [listVote]="selectedVote()"> </lfx-vote-results-drawer>
</div>
