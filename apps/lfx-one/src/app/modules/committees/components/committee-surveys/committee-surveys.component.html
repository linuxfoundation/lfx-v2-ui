<div class="flex flex-col gap-4 pt-4" data-testid="committee-surveys-tab">
  @if (surveys().length > 0) {
    <lfx-surveys-table [surveys]="surveys()" [hasPMOAccess]="canEdit()" [loading]="loading()" (viewResults)="viewSurveyResults($event)"> </lfx-surveys-table>
  } @else if (!loading()) {
    <lfx-card>
      <div class="flex flex-col items-center py-12">
        <i class="fa-light fa-chart-simple text-3xl text-gray-300 mb-3"></i>
        <p class="text-sm font-medium text-gray-600">No surveys</p>
        <p class="text-xs text-gray-400 mt-1">Surveys for this group will appear here.</p>
      </div>
    </lfx-card>
  }

  <lfx-survey-results-drawer [(visible)]="resultsDrawerVisible" [surveyId]="selectedSurveyId()" [listSurvey]="selectedSurvey()" [hasPMOAccess]="canEdit()">
  </lfx-survey-results-drawer>
</div>
