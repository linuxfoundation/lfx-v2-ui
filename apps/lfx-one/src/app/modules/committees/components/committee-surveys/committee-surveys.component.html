<div class="flex flex-col gap-4 pt-2" data-testid="committee-surveys-tab">
  @if (loading() || surveys().length > 0) {
    <lfx-surveys-table
      [surveys]="surveys()"
      [hasPMOAccess]="canEdit()"
      [loading]="loading()"
      (viewResults)="viewSurveyResults($event)"
      (rowClick)="viewSurveyResults($event.uid)">
      @if (canEdit()) {
        <lfx-button
          tableActions
          label="Create Survey"
          icon="fa-light fa-chart-simple"
          severity="info"
          size="small"
          [routerLink]="['/surveys', 'create']"
          [queryParams]="{ committee_uid: committee().uid }"
          data-testid="committee-surveys-create-btn"></lfx-button>
      }
    </lfx-surveys-table>
  } @else {
    @if (canEdit()) {
      <div class="flex items-center justify-end">
        <lfx-button
          label="Create Survey"
          icon="fa-light fa-chart-simple"
          severity="info"
          size="small"
          [routerLink]="['/surveys', 'create']"
          [queryParams]="{ committee_uid: committee().uid }"
          data-testid="committee-surveys-create-btn"></lfx-button>
      </div>
    }
    <lfx-card>
      <div class="flex flex-col items-center py-12">
        <i class="fa-light fa-chart-simple text-3xl text-gray-300 mb-3" aria-hidden="true"></i>
        <p class="text-sm font-medium text-gray-600">No surveys yet</p>
        <p class="text-xs text-gray-400 mt-1">Surveys for this committee will appear here.</p>
      </div>
    </lfx-card>
  }

  <lfx-survey-results-drawer [(visible)]="resultsDrawerVisible" [surveyId]="selectedSurveyId()" [listSurvey]="selectedSurvey()" [hasPMOAccess]="canEdit()">
  </lfx-survey-results-drawer>
</div>
