<div class="flex flex-col gap-6 pt-4 max-w-3xl mx-auto" data-testid="committee-settings-tab">
  <!-- Header -->
  <div class="flex justify-between items-start">
    <div>
      <h2 class="text-lg font-semibold text-gray-900">Group Settings</h2>
      <p class="text-sm text-gray-500">Configure permissions and features for your group.</p>
    </div>
    <lfx-button label="Save Changes" severity="info" size="small" icon="fa-light fa-floppy-disk" (onClick)="saveSettings()" [loading]="saving()"></lfx-button>
  </div>

  <!-- Reuse existing settings form -->
  <lfx-committee-settings [form]="form"></lfx-committee-settings>
</div>
