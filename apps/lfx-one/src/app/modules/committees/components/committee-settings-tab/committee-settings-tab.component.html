<div class="flex flex-col gap-6 pt-4 max-w-3xl mx-auto" data-testid="committee-settings-tab">
  <!-- Header -->
  <div class="flex justify-between items-start">
    <div>
      <h2 class="text-[17.5px] font-semibold text-gray-900">Group Settings</h2>
      <p class="text-[13px] text-gray-500 leading-relaxed">Configure permissions and features for your group.</p>
    </div>
    <lfx-button label="Save Changes" severity="info" size="small" icon="fa-light fa-floppy-disk" (onClick)="saveSettings()" [loading]="saving()"></lfx-button>
  </div>

  <!-- Reuse existing settings form (hide its own header) -->
  <lfx-committee-settings [form]="form" [showHeader]="false"></lfx-committee-settings>

  <!-- Danger Zone -->
  <div class="mt-10 border border-red-300 rounded-xl p-5 bg-red-50" data-testid="committee-settings-danger-zone">
    <div class="flex items-start justify-between gap-5">
      <div>
        <h2 class="text-sm font-semibold text-red-900 flex items-center gap-2 mb-1.5">
          <i class="fa-light fa-triangle-exclamation text-red-600"></i>
          Danger Zone
        </h2>
        <p class="text-[12.5px] text-red-900 leading-relaxed">
          Permanently delete this group and all associated data including meetings, votes, surveys, and member records. This action cannot be undone.
        </p>
      </div>
      <lfx-button label="Delete Group" severity="danger" size="small" icon="fa-light fa-trash" (onClick)="confirmDelete()" [loading]="deleting()"></lfx-button>
    </div>
  </div>
</div>

<p-confirmDialog></p-confirmDialog>
