<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
  <!-- Member Selection -->
  <div>
    <label for="member-select" class="block text-sm font-medium text-gray-700 mb-1"> Select Member <span class="text-red-500">*</span> </label>
    <lfx-select
      size="small"
      [form]="form"
      control="member_uid"
      [options]="memberOptions()"
      [filter]="true"
      filterBy="label"
      filterPlaceholder="Search by name or organization..."
      placeholder="Choose a member"
      styleClass="w-full"
      appendTo="body"
      [showClear]="true"
      id="member-select"
      data-testid="assign-leadership-member-select">
    </lfx-select>
  </div>

  <!-- Effective Date -->
  <div>
    <label for="elected-date" class="block text-sm font-medium text-gray-700 mb-1"> Effective Date </label>
    <lfx-calendar
      [form]="form"
      control="elected_date"
      placeholder="Select effective date"
      [showButtonBar]="true"
      appendTo="body"
      data-testid="assign-leadership-elected-date">
    </lfx-calendar>
  </div>

  <!-- Form Actions -->
  <div class="flex justify-between pt-6 border-t">
    <div>
      @if (currentLeader) {
        <lfx-button
          [label]="'Remove ' + roleLabel"
          severity="danger"
          [outlined]="true"
          [loading]="removing()"
          [disabled]="submitting() || removing()"
          (onClick)="onRemove()"
          size="small"
          type="button"
          data-testid="assign-leadership-remove-btn">
        </lfx-button>
      }
    </div>
    <div class="flex gap-3">
      <lfx-button
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        (onClick)="onCancel()"
        size="small"
        type="button"
        data-testid="assign-leadership-cancel-btn">
      </lfx-button>
      <lfx-button
        [label]="'Assign ' + roleLabel"
        [loading]="submitting()"
        [disabled]="!form.value.member_uid || submitting() || removing()"
        type="submit"
        size="small"
        data-testid="assign-leadership-submit-btn">
      </lfx-button>
    </div>
  </div>
</form>
