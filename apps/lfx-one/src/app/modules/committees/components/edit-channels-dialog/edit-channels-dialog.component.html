<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
  <!-- Mailing List Section -->
  <fieldset class="flex flex-col gap-3">
    <legend class="text-sm font-medium text-gray-700 mb-1">Mailing List</legend>
    <div>
      <label for="mailing-list-name" class="block text-xs text-gray-500 mb-1">List Name</label>
      <lfx-input-text
        [form]="form"
        control="mailingListName"
        size="small"
        placeholder="e.g. gold-voting-class"
        id="mailing-list-name"
        data-testid="edit-channels-mailing-list-name">
      </lfx-input-text>
    </div>
    <div>
      <label for="mailing-list-url" class="block text-xs text-gray-500 mb-1">URL</label>
      <lfx-input-text
        [form]="form"
        control="mailingListUrl"
        type="url"
        size="small"
        placeholder="e.g. https://lists.aaif.dev/g/..."
        id="mailing-list-url"
        data-testid="edit-channels-mailing-list-url">
      </lfx-input-text>
    </div>
  </fieldset>

  <!-- Chat Channel Section -->
  <fieldset class="flex flex-col gap-3">
    <legend class="text-sm font-medium text-gray-700 mb-1">Chat Channel</legend>
    <div>
      <label for="chat-platform" class="block text-xs text-gray-500 mb-1">Platform</label>
      <lfx-select
        [form]="form"
        control="chatChannelPlatform"
        [options]="platformOptions"
        size="small"
        styleClass="w-full"
        appendTo="body"
        id="chat-platform"
        data-testid="edit-channels-platform-select">
      </lfx-select>
    </div>
    <div>
      <label for="chat-channel-name" class="block text-xs text-gray-500 mb-1">Channel Name</label>
      <lfx-input-text
        [form]="form"
        control="chatChannelName"
        size="small"
        placeholder="e.g. #gold-voting-class"
        id="chat-channel-name"
        data-testid="edit-channels-channel-name">
      </lfx-input-text>
    </div>
    <div>
      <label for="chat-channel-url" class="block text-xs text-gray-500 mb-1">URL</label>
      <lfx-input-text
        [form]="form"
        control="chatChannelUrl"
        type="url"
        size="small"
        placeholder="e.g. https://aaif.slack.com/archives/..."
        id="chat-channel-url"
        data-testid="edit-channels-channel-url">
      </lfx-input-text>
    </div>
  </fieldset>

  <!-- Form Actions -->
  <div class="flex justify-end gap-3 pt-6 border-t">
    <lfx-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="onCancel()" size="small" type="button" data-testid="edit-channels-cancel-btn">
    </lfx-button>
    <lfx-button label="Save" [loading]="submitting()" [disabled]="submitting()" type="submit" size="small" data-testid="edit-channels-submit-btn"> </lfx-button>
  </div>
</form>
