<div class="flex flex-col gap-4">
  <p class="text-sm text-gray-500">
    @if (mode === 'invite_only') {
      Provide a brief message to help admins understand why you need access to
      <strong>{{ committeeName }}</strong
      >.
    } @else {
      Optionally include a message to introduce yourself or explain why you'd like to join
      <strong>{{ committeeName }}</strong
      >.
    }
  </p>
  <lfx-textarea
    [form]="applicationForm"
    control="message"
    [rows]="5"
    [maxlength]="2000"
    placeholder="Enter your message (optional)…"
    [autoResize]="true"
    styleClass="!w-full"
    dataTest="committee-view-application-message-textarea"></lfx-textarea>
</div>
<div class="flex justify-end gap-2 mt-4">
  <lfx-button label="Cancel" severity="secondary" [outlined]="true" size="small" (onClick)="cancel()"></lfx-button>
  <lfx-button [label]="mode === 'invite_only' ? 'Submit Request' : 'Submit Application'" severity="info" size="small" (onClick)="submit()"></lfx-button>
</div>
