<lfx-card data-testid="committee-documents-card">
  <!-- Filters -->
  <div class="pb-2 mb-2">
    <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
      <!-- Search -->
      <div class="flex-1 min-w-0">
        <lfx-input-text
          [form]="filterForm"
          control="search"
          placeholder="Search documents..."
          icon="fa-light fa-search"
          styleClass="w-full"
          size="small"
          data-testid="committee-documents-search-input">
        </lfx-input-text>
      </div>

      <!-- Source filter -->
      <div class="w-full sm:w-auto sm:shrink-0">
        <lfx-select
          [form]="filterForm"
          control="source"
          size="small"
          [options]="sourceOptions"
          placeholder="All Sources"
          [showClear]="true"
          styleClass="w-full"
          data-testid="committee-documents-source-filter">
        </lfx-select>
      </div>
    </div>
  </div>

  <!-- Table -->
  <lfx-documents-table
    [documents]="filteredDocuments()"
    [loading]="loading()"
    [showFoundation]="false"
    testIdPrefix="committee-documents"
    emptyMessage="No documents found for this group">
  </lfx-documents-table>
</lfx-card>
