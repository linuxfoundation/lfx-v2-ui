<lfx-card data-testid="committee-documents-card">
  <!-- Filters -->
  <div class="pb-3 mb-3 border-b border-gray-100">
    <div class="flex flex-wrap items-center gap-2">
      <!-- Search -->
      <div class="flex-1 min-w-48">
        <lfx-input-text
          [form]="filterForm"
          control="search"
          placeholder="Search documents..."
          icon="fa-light fa-search"
          styleClass="w-full"
          size="small"
          data-testid="committee-documents-search-input">
        </lfx-input-text>
      </div>

      <!-- Source filter -->
      <div class="w-36 shrink-0 overflow-hidden">
        <lfx-select
          [form]="filterForm"
          control="source"
          size="small"
          [options]="sourceOptions"
          placeholder="All Sources"
          [showClear]="true"
          styleClass="w-full"
          data-testid="committee-documents-source-filter">
        </lfx-select>
      </div>
    </div>
  </div>

  <!-- Table -->
  <lfx-table
    [value]="filteredDocuments()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="loading()"
    [showPageLinks]="false"
    [showFirstLastIcon]="false"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    data-testid="committee-documents-table">
    <ng-template #header>
      <tr>
        <th class="w-[50%]">Name</th>
        <th class="w-[20%]">Meeting / Group</th>
        <th class="w-[15%]">Source</th>
        <th class="w-[10%]">Date</th>
        <th class="w-[5%]">Actions</th>
      </tr>
    </ng-template>

    <ng-template #body let-doc let-rowIndex="rowIndex">
      <tr [attr.data-row-index]="rowIndex" [attr.data-testid]="'committee-documents-row-' + doc.id">
        <!-- Name column -->
        <td>
          <div class="flex items-center gap-2">
            <i [class]="(doc.source | myDocumentSourceTag: 'icon') + ' ' + (doc.source | myDocumentSourceTag: 'iconClass')" class="text-base shrink-0"></i>
            @if (doc.url) {
              <button
                type="button"
                class="text-blue-600 hover:text-blue-700 hover:underline font-medium text-xs text-left bg-transparent border-none cursor-pointer p-0 truncate"
                (click)="openDocument(doc)"
                [attr.data-testid]="'committee-documents-name-' + doc.id">
                {{ doc.name }}
              </button>
            } @else {
              <span class="text-xs text-gray-900 truncate">{{ doc.name }}</span>
            }
          </div>
        </td>

        <!-- Meeting / Group column -->
        <td>
          <span class="text-xs text-gray-700">{{ doc.groupOrMeetingName || '—' }}</span>
        </td>

        <!-- Source column -->
        <td>
          <lfx-tag
            [value]="doc.source | myDocumentSourceTag: 'label'"
            [severity]="doc.source | myDocumentSourceTag: 'severity'"
            [attr.data-testid]="'committee-documents-source-tag-' + doc.id">
          </lfx-tag>
        </td>

        <!-- Date column -->
        <td>
          <span class="text-xs text-gray-700">{{ doc.date | date: 'MMM d, y' }}</span>
        </td>

        <!-- Actions column -->
        <td>
          <div class="flex items-center justify-end gap-1">
            @if (doc.source === 'file' && doc.attachmentUid) {
              <lfx-button
                icon="fa-light fa-arrow-down-to-line"
                severity="primary"
                size="small"
                [text]="true"
                (onClick)="openDocument(doc)"
                [attr.data-testid]="'committee-documents-download-' + doc.id"
                tooltip="Download"
                tooltipPosition="top">
              </lfx-button>
            } @else if (doc.url) {
              <lfx-button
                [icon]="doc.source === 'recording' ? 'fa-solid fa-circle-play' : 'fa-light fa-arrow-up-right-from-square'"
                severity="primary"
                size="small"
                [text]="true"
                (onClick)="openDocument(doc)"
                [attr.data-testid]="'committee-documents-open-' + doc.id"
                [tooltip]="doc.source === 'recording' ? 'Play recording' : 'Open'"
                tooltipPosition="top">
              </lfx-button>
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="5" class="text-center py-8">
          <i class="fa-light fa-file-lines text-3xl text-gray-400 mb-2 block"></i>
          <p class="text-sm text-gray-500">No documents found for this group</p>
        </td>
      </tr>
    </ng-template>
  </lfx-table>
</lfx-card>
