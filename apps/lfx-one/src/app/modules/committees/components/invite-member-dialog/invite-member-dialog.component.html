<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5 p-2">
  <!-- Info -->
  <p class="text-sm text-gray-600">
    Invite colleagues to join <strong>{{ committee?.display_name || committee?.name }}</strong
    >. They will receive an email with a one-click link to accept.
  </p>

  <!-- Email addresses -->
  <div class="flex flex-col gap-1">
    <label for="invite-emails" class="text-sm font-semibold text-gray-900">Email addresses</label>
    <lfx-textarea
      [form]="form"
      control="emails"
      [rows]="3"
      placeholder="Enter email addresses separated by commas or new lines"
      id="invite-emails"
      styleClass="w-full"
      dataTest="committees-invite-emails-input">
    </lfx-textarea>
    @if (form.get('emails')?.touched && form.get('emails')?.hasError('required')) {
      <span class="text-xs text-red-500">At least one email address is required</span>
    }
  </div>

  <!-- Optional message -->
  <div class="flex flex-col gap-1">
    <label for="invite-message" class="text-sm font-semibold text-gray-900">Personal message <span class="text-gray-400 font-normal">(optional)</span></label>
    <lfx-textarea
      [form]="form"
      control="message"
      [rows]="2"
      placeholder="Add a personal note to the invite email..."
      id="invite-message"
      styleClass="w-full"
      dataTest="committees-invite-message-input">
    </lfx-textarea>
  </div>

  <!-- Actions -->
  <div class="flex justify-end gap-3 pt-2">
    <lfx-button label="Cancel" severity="secondary" size="small" (onClick)="onCancel()" data-testid="committees-invite-cancel-btn"></lfx-button>
    <lfx-button
      label="Send Invites"
      icon="fa-light fa-paper-plane"
      size="small"
      type="submit"
      [loading]="submitting()"
      [disabled]="submitting()"
      data-testid="committees-invite-send-btn">
    </lfx-button>
  </div>
</form>
