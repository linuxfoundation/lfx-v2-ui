<div class="mx-auto flex max-w-5xl flex-col gap-8" data-testid="docs-landing">
  <header class="flex flex-col gap-3">
    <h1 class="text-3xl font-bold text-gray-900">LFX Self Serve Documentation</h1>
    <p class="max-w-3xl text-base text-gray-600">Browse user guides, FAQs, and how-tos. Pick a topic below to dive in.</p>

    <lfx-docs-search data-testid="docs-landing-search" />
  </header>

  @if (topics.length > 0) {
    <ul class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3" data-testid="docs-topics-grid">
      @for (topic of topics; track topic.slug) {
        <li>
          <lfx-docs-topic-card [topic]="topic" />
        </li>
      }
    </ul>
  } @else {
    <p class="text-sm text-gray-500" data-testid="docs-landing-empty">No topics are available yet. Please check back later.</p>
  }
</div>
