<div class="container mx-auto px-4 sm:px-6 lg:px-8" data-testid="documents-dashboard">
  <!-- Page Header -->
  <div class="flex items-start justify-between mb-8">
    <div>
      <h1 class="font-display font-light text-2xl mb-1" data-testid="documents-dashboard-title">{{ pageTitle() }}</h1>
      <p class="mt-1 text-gray-500" data-testid="documents-dashboard-description">{{ pageDescription() }}</p>
    </div>
  </div>

  <!-- Filter Bar + Table -->
  <lfx-card data-testid="documents-table-card">
    <!-- Filters -->
    <div class="pb-3 mb-3 border-b border-gray-100">
      <div class="flex flex-wrap items-center gap-2">
        <!-- Search -->
        <div class="flex-1 min-w-48">
          <lfx-input-text
            [form]="filterForm"
            control="search"
            placeholder="Search documents..."
            icon="fa-light fa-search"
            styleClass="w-full"
            size="small"
            data-testid="documents-search-input">
          </lfx-input-text>
        </div>

        <!-- Foundation filter (Me lens only — non-Me lenses are already scoped) -->
        @if (isMeLens()) {
          <div class="w-40 shrink-0 overflow-hidden">
            <lfx-select
              [form]="filterForm"
              control="foundation"
              size="small"
              [options]="foundationOptions()"
              placeholder="All Foundations"
              [showClear]="true"
              [filter]="true"
              filterPlaceholder="Search foundations..."
              styleClass="w-full"
              data-testid="documents-foundation-filter">
            </lfx-select>
          </div>
        }

        <!-- Group filter -->
        <div class="w-36 shrink-0 overflow-hidden">
          <lfx-select
            [form]="filterForm"
            control="group"
            size="small"
            [options]="groupOptions()"
            placeholder="All Groups"
            [showClear]="true"
            [filter]="true"
            filterPlaceholder="Search groups..."
            styleClass="w-full"
            data-testid="documents-group-filter">
          </lfx-select>
        </div>

        <!-- Meeting filter -->
        <div class="w-36 shrink-0 overflow-hidden">
          <lfx-select
            [form]="filterForm"
            control="meeting"
            size="small"
            [options]="meetingOptions()"
            placeholder="All Meetings"
            [showClear]="true"
            [filter]="true"
            filterPlaceholder="Search meetings..."
            styleClass="w-full"
            data-testid="documents-meeting-filter">
          </lfx-select>
        </div>

        <!-- Mailing list filter -->
        <div class="w-40 shrink-0 overflow-hidden">
          <lfx-select
            [form]="filterForm"
            control="mailingList"
            size="small"
            [options]="mailingListOptions()"
            placeholder="All Mailing Lists"
            [showClear]="true"
            [filter]="true"
            filterPlaceholder="Search mailing lists..."
            styleClass="w-full"
            data-testid="documents-mailing-list-filter">
          </lfx-select>
        </div>

        <!-- Source filter -->
        <div class="w-32 shrink-0 overflow-hidden">
          <lfx-select
            [form]="filterForm"
            control="source"
            size="small"
            [options]="sourceOptions"
            placeholder="All Sources"
            [showClear]="true"
            styleClass="w-full"
            data-testid="documents-source-filter">
          </lfx-select>
        </div>
      </div>
    </div>

    <!-- Table -->
    <lfx-documents-table [documents]="filteredDocuments()" [loading]="loading()" [showFoundation]="true" testIdPrefix="documents"> </lfx-documents-table>
  </lfx-card>
</div>
