<div class="newsletter-compose flex flex-col gap-4 px-4 lg:px-6 py-6 max-w-screen-2xl mx-auto w-full" data-testid="newsletter-compose">
  <!-- Header -->
  <header class="flex flex-wrap items-center justify-between gap-3" data-testid="newsletter-compose-header">
    <div class="flex flex-col gap-1">
      <h1 class="text-xl font-semibold text-slate-900">Newsletter</h1>
      <p class="text-sm text-slate-500">
        Compose a message and send it to one or more committees in
        <strong class="text-slate-700">{{ displayName() || 'this context' }}</strong
        >.
      </p>
    </div>

    <div class="flex items-center gap-2">
      <lfx-button
        label="Preview"
        icon="fa-regular fa-eye"
        severity="secondary"
        [outlined]="true"
        size="small"
        styleClass="lg:!hidden"
        (onClick)="togglePreview()"
        ariaLabel="Toggle preview"
        data-testid="newsletter-compose-preview-toggle">
      </lfx-button>
      <lfx-button
        label="Send"
        icon="fa-regular fa-paper-plane"
        severity="primary"
        size="small"
        [disabled]="!canSend()"
        (onClick)="openSendDrawer()"
        data-testid="newsletter-compose-send-button">
      </lfx-button>
    </div>
  </header>

  <!-- Two-column workspace (collapses below lg) -->
  <div class="newsletter-compose__workspace grid gap-6" [class.lg:grid-cols-2]="true">
    <!-- Editor column -->
    <section class="flex flex-col gap-4" [class.hidden]="mobilePreviewVisible()" [class.lg:flex]="true" data-testid="newsletter-compose-editor-column">
      <div class="flex flex-col gap-2">
        <label for="newsletter-subject" class="text-sm font-medium text-slate-700">Subject</label>
        <lfx-input-text
          id="newsletter-subject"
          [form]="form"
          control="subject"
          placeholder="A short headline your recipients will see in their inbox"
          styleClass="w-full"
          data-testid="newsletter-compose-subject">
        </lfx-input-text>
      </div>

      <div class="flex flex-col gap-2 flex-1">
        <label class="text-sm font-medium text-slate-700">Body</label>
        <lfx-editor
          [form]="form"
          control="bodyHtml"
          placeholder="Share updates, recognize contributors, or announce what's next…"
          [style]="{ height: '420px' }"
          dataTest="newsletter-compose-body">
        </lfx-editor>
      </div>
    </section>

    <!-- Preview column -->
    <section class="flex flex-col gap-3" [class.hidden]="!mobilePreviewVisible()" [class.lg:flex]="true" data-testid="newsletter-compose-preview-column">
      <div class="flex items-center justify-between">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Live preview</span>
        <span class="text-xs text-slate-400">As your recipients will see it</span>
      </div>
      <lfx-newsletter-preview
        [subject]="subjectValue()"
        [bodyHtml]="bodyValue()"
        [edName]="edName()"
        [logoUrl]="logoUrl()"
        [displayName]="displayName()"
        [edReplyEmail]="edEmail()">
      </lfx-newsletter-preview>
    </section>
  </div>

  <!-- Send drawer -->
  <lfx-newsletter-send-drawer
    [(visible)]="sendDrawerVisible"
    [subject]="subjectValue()"
    [bodyHtml]="bodyValue()"
    [contextType]="contextType()"
    [contextUid]="contextUid()"
    [edEmail]="edEmail()"
    (newsletterSent)="onSendComplete()">
  </lfx-newsletter-send-drawer>
</div>
