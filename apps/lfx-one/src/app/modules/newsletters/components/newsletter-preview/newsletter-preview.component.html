<div class="newsletter-preview" data-testid="newsletter-preview">
  <div class="newsletter-preview__frame">
    @if (hasContent()) {
      <div class="newsletter-preview__header">
        @if (logoUrl()) {
          <img class="newsletter-preview__logo" [src]="logoUrl()" [alt]="displayName()" />
        }
        <div class="newsletter-preview__brand">
          <div class="newsletter-preview__eyebrow">{{ displayName() || 'Foundation' }} · Newsletter</div>
          <div class="newsletter-preview__subject">{{ subject() || 'Untitled' }}</div>
        </div>
      </div>

      <div class="newsletter-preview__body" [innerHTML]="bodyHtml()"></div>
    } @else {
      <div class="newsletter-preview__empty">
        <i class="fa-regular fa-envelope newsletter-preview__empty-icon"></i>
        <div class="newsletter-preview__empty-title">Live preview</div>
        <div class="newsletter-preview__empty-subtitle">Start typing on the left to see your newsletter take shape.</div>
      </div>
    }
  </div>
</div>
