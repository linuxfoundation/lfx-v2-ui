<!-- Dev Toolbar (fixed at top) -->
<lfx-dev-toolbar></lfx-dev-toolbar>

<div class="flex min-h-screen" [ngClass]="{ 'pt-12': showDevToolbar() }">
  <!-- Nav - Desktop: Navy rail + white sidebar panel -->
  <div class="hidden lg:flex flex-row flex-shrink-0 fixed left-0 bottom-0 w-[296px]" [ngClass]="{ 'top-12': showDevToolbar(), 'top-0': !showDevToolbar() }">

    <!-- Lens Rail -->
    <div class="flex flex-col bg-blue-800 w-20 h-full items-center py-6 gap-3 flex-shrink-0">
      <!-- LFX Logo mark (white) -->
      <div class="flex items-center justify-center w-9 h-9">
        <a [routerLink]="['/']">
          <svg width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.96369 15.9789V7.98987H0V19.9504H11.9372V15.9789H3.96369Z" fill="white"/>
            <path d="M19.8645 0H0V6.00333H3.96369V4.01761H15.9009V15.9781H13.919V19.9495H19.8645V0Z" fill="white"/>
          </svg>
        </a>
      </div>

      <!-- Me Lens -->
      <button type="button" (click)="setActiveLens('me')"
        class="rail-btn flex items-center justify-center w-9 h-9 rounded-lg transition-colors"
        [ngClass]="activeLens() === 'me' ? 'bg-white/20 text-white' : 'text-blue-200 hover:text-white hover:bg-white/10'"
        data-tooltip="Me">
        <i class="fa-solid fa-user text-xl"></i>
      </button>

      <!-- Projects Lens -->
      <button type="button" (click)="setActiveLens('foundation')"
        class="rail-btn flex items-center justify-center w-9 h-9 rounded-lg transition-colors"
        [ngClass]="activeLens() === 'foundation' ? 'bg-white/20 text-white' : 'text-blue-200 hover:text-white hover:bg-white/10'"
        data-tooltip="Projects">
        <i class="fa-solid fa-laptop-code text-xl"></i>
      </button>

      <!-- Organization Lens -->
      <button type="button" (click)="setActiveLens('organization')"
        class="rail-btn flex items-center justify-center w-9 h-9 rounded-lg transition-colors"
        [ngClass]="activeLens() === 'organization' ? 'bg-white/20 text-white' : 'text-blue-200 hover:text-white hover:bg-white/10'"
        data-tooltip="Organization">
        <i class="fa-solid fa-building text-xl"></i>
      </button>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Support -->
      <a [href]="supportUrl" target="_blank" rel="noopener noreferrer"
        class="rail-btn flex items-center justify-center w-9 h-9 rounded-lg transition-colors text-blue-200 hover:text-white hover:bg-white/10"
        data-tooltip="Support">
        <i class="fa-light fa-circle-question text-xl"></i>
      </a>

      <!-- Log out -->
      <a href="/logout"
        class="rail-btn flex items-center justify-center w-9 h-9 rounded-lg transition-colors text-blue-200 hover:text-white hover:bg-white/10"
        data-tooltip="Log out">
        <i class="fa-light fa-right-from-bracket text-xl"></i>
      </a>
    </div>

    <!-- White Sidebar Panel -->
    <div class="flex-1 h-full border-r border-gray-200">
      <lfx-sidebar
        [items]="sidebarItems()"
        [footerItems]="sidebarFooterItems()"
        [showProjectSelector]="activeLens() === 'foundation'"
        [showLogo]="false">
      </lfx-sidebar>
    </div>
  </div>

  <!-- Sidebar - Mobile Drawer -->
  <p-drawer
    [visible]="showMobileSidebar()"
    (visibleChange)="onDrawerVisibilityChange($event)"
    position="left"
    [modal]="true"
    [dismissable]="true"
    [showCloseIcon]="true"
    styleClass="lg:hidden w-86 mobile-sidebar-drawer"
    data-testid="mobile-sidebar-drawer">
    <ng-template #header>
      <div class="flex items-center gap-3">
        <a [routerLink]="['/']" class="flex items-center">
          <img src="/images/logo_lfx.svg" alt="LFX Logo" class="w-auto h-5" />
        </a>
      </div>
    </ng-template>
    <lfx-sidebar [items]="sidebarItems()" [footerItems]="sidebarFooterItems()" [showProjectSelector]="activeLens() === 'foundation'" [mobile]="true"></lfx-sidebar>
  </p-drawer>

  <!-- Main Content Area -->
  <main class="flex-1 min-w-0 transition-all duration-300 lg:ml-[296px] flex flex-col" data-testid="main-content">
    <!-- Mobile Menu Button -->
    <div class="lg:hidden sticky z-30 bg-white border-b border-gray-200 px-5 py-3" [ngClass]="{ 'top-12': showDevToolbar(), 'top-0': !showDevToolbar() }">
      <button
        type="button"
        class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors"
        (click)="toggleMobileSidebar()"
        aria-label="Toggle menu"
        data-testid="mobile-menu-button">
        <i class="fa-light fa-bars text-gray-600 text-xl"></i>
      </button>
    </div>
    <div class="flex-grow px-5 md:px-8 py-6">
      <router-outlet />
    </div>
    <!-- Footer Component -->
    <lfx-footer class="md:ml-8 p-8 mt-auto"></lfx-footer>
  </main>
</div>
