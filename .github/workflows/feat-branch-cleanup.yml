---
name: Docker Cleanup - Feature Branch

on:
  delete:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    if: github.event.ref_type == 'branch' && startsWith(github.event.ref, 'feat/')
    runs-on: ubuntu-latest

    steps:
      - name: Compute branch slug
        id: slug
        env:
          REF_NAME: ${{ github.event.ref }}
        run: |
          # Strip feat/ prefix, lowercase, replace non-alphanumeric with -, truncate to 40
          # Strip leading/trailing dashes after sanitization
          SLUG=$(echo "$REF_NAME" \
            | sed 's|^feat/||' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/^-\+//;s/-\+$//' \
            | cut -c1-40)
          echo "value=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Delete container image from GHCR
        uses: actions/github-script@v7
        env:
          SLUG: ${{ steps.slug.outputs.value }}
        with:
          script: |
            const tag = `feat-${process.env.SLUG}`;
            const packageName = context.repo.repo;
            const org = context.repo.owner;

            core.info(`Looking for package version with tag: ${tag}`);

            // List all versions of the package
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
              {
                package_type: 'container',
                package_name: packageName,
                org,
                per_page: 100,
              }
            );

            const match = versions.find(v => v.metadata?.container?.tags?.includes(tag));

            if (!match) {
              core.warning(`No image found with tag ${tag} — nothing to delete.`);
              return;
            }

            core.info(`Deleting version ${match.id} (${tag})`);
            await github.rest.packages.deletePackageVersionForOrg({
              package_type: 'container',
              package_name: packageName,
              org,
              package_version_id: match.id,
            });
            core.info(`Deleted image tag ${tag} successfully.`);
