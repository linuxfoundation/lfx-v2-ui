replicaCount: 3

# strategy controls the Kubernetes rolling update behavior.
# maxSurge: "100%" spins up a full new replica set before terminating any old pods (zero disruption).
# maxUnavailable: 0 ensures the ready count never drops below the desired replica count.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: "100%"
    maxUnavailable: 0

# terminationGracePeriodSeconds must exceed preStop.sleep + PM2 kill_timeout (10s + 25s = 35s).
# 60s provides an additional 25s margin for service drain (NATS, Snowflake).
terminationGracePeriodSeconds: 60

# lifecycle hooks run inside the container before SIGTERM is sent.
# The preStop sleep gives kube-proxy / Traefik time to propagate endpoint removal
# so no new requests arrive on a pod that is about to be terminated.
lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 10"]

# podDisruptionBudget configures a PodDisruptionBudget for the deployment.
# Only one of minAvailable or maxUnavailable may be set (not both).
podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

image:
  repository: ghcr.io/linuxfoundation/lfx-self-serve
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# External Secrets Operator configuration
# Manages secrets from external providers (AWS Secrets Manager, HashiCorp Vault, etc.)
# Requires the External Secrets Operator to be installed in the cluster
externalSecrets:
  # Enable ExternalSecrets integration
  # When enabled, a SecretStore and ExternalSecret will be created
  enabled: false

  # Provider configuration (required)
  # Defines which external secret provider to use and how to authenticate
  # Examples:
  #
  # AWS Secrets Manager:
  # provider:
  #   aws:
  #     service: SecretsManager
  #     region: us-east-1
  #     auth:
  #       jwt:
  #         serviceAccountRef:
  #           name: lfx-self-serve-sa
  provider: {}

  # Annotations to add to ExternalSecret resources
  annotations: {}

  # SecretStore-specific configuration
  secretStore:
    # Annotations specific to the SecretStore resource
    annotations: {}
    # Name of the SecretStore resource
    # Defaults to the fullname template if not specified
    name: ""

  # Name of the ExternalSecret resource
  # Defaults to the fullname template if not specified
  name: ""

  # How frequently the secret should be refreshed from the external provider
  # Format: 10s, 1m, 1h, etc. (default: 10m)
  refreshInterval: "10m"

  # Target Kubernetes Secret configuration
  target:
    # Name of the Secret that will be created/managed (required)
    name: ""

    # Creation policy for the target Secret
    # - Owner: ExternalSecret owns the Secret, deletion of ExternalSecret deletes the Secret
    # - Orphan: Secret won't be deleted when ExternalSecret is deleted
    # - Merge: Merge with existing Secret if it exists
    # - None: Don't create or update the Secret
    creationPolicy: "Owner"

    # Template for generating the Secret content
    # Allows transformation of secret data before creating the Kubernetes Secret
    # Example:
    #   template:
    #     engineVersion: v2
    #     data:
    #       config.json: |
    #         {
    #           "apiKey": "{{ .apiKey }}",
    #           "secretKey": "{{ .secretKey }}"
    #         }
    template: {}

  # Fetch multiple secrets using queries (required)
  # Example:
  #   dataFrom:
  #     - find:
  #         tags:
  #           service: "lfx-self-serve"
  #       rewrite:
  #         - merge: {}
  dataFrom:
    - find:
        tags:
          service: pcc
      rewrite:
        - merge: {}
    - find:
        tags:
          service-pcc: enabled
      rewrite:
        - merge: {}

# Global annotations to add to all resources
annotations: {}

# Global labels to add to all resources
labels: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 4000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

# Startup probe — gates liveness and readiness during the initial startup window.
# Once it succeeds, Kubernetes hands off to livenessProbe and readinessProbe.
# Budget: 10s initial delay + (10s × 30 failures) = 310s (~5 min) maximum,
# giving headroom over the observed ~4 min cold-start time.
# Set to null to disable: startupProbe: null
startupProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

# Liveness probe — restarts the pod if it becomes unresponsive at runtime.
# startupProbe handles the startup window, so initialDelaySeconds is 0 here.
# Targets GET /livez (plain text "OK"), registered before logging, auth, and
# rate-limit middleware so it is always reachable if the process is alive.
# Set to null to disable: livenessProbe: null
livenessProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe — controls when the pod receives traffic from the Service.
# startupProbe handles the startup window, so initialDelaySeconds is 0 here.
# Targets GET /readyz (JSON {"status":"ready"}) which is registered before
# pino-http so probes don't pollute request logs. The endpoint confirms that
# Express is listening and the Angular SSR engine loaded; it intentionally
# does not probe lazy-initialized clients (NATS, Snowflake) because those
# report not-connected at startup even when most SSR pages render fine without
# them. See apps/lfx-one/src/server/server.ts for implementation details.
# Set to null to disable: readinessProbe: null
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Environment variables for the application
# Uses map/object format for deep merging support
environment:
  # Node.js environment
  NODE_ENV:
    value: production
  
  # Application configuration
  PORT:
    value: "4000"
  
  # Cache and temporary directories
  COREPACK_HOME:
    value: "/home/appuser/.cache/node/corepack"
  XDG_CACHE_HOME:
    value: "/home/appuser/.cache"
  TMPDIR:
    value: "/tmp"
  
  # PCC specific configuration
  PCC_BASE_URL:
    value: "https://pcc.k8s.orb.local"
  
  # Auth0 configuration (non-secret values)
  PCC_AUTH0_ISSUER_BASE_URL:
    value: "https://linuxfoundation-dev.auth0.com/"
  PCC_AUTH0_AUDIENCE:
    value: "https://api-gw.dev.platform.linuxfoundation.org/"
  M2M_AUTH_ISSUER_BASE_URL:
    value: "https://linuxfoundation-dev.auth0.com/"
  M2M_AUTH_AUDIENCE:
    value: "https://api-gw.dev.platform.linuxfoundation.org/"

  # API Gateway — audience for the secondary silent access token and base URL for outbound API calls
  API_GW_AUDIENCE:
    value: "https://api-gw.dev.platform.linuxfoundation.org/"

  # Environment identifier
  ENV:
    value: "production"

  # Query service configuration
  QUERY_SERVICE_URL:
    value: "http://query-service.default.svc.cluster.local/query/resources"

  # Optional configuration with defaults
  LOG_LEVEL:
    value: "info"

  # required environment variable secrets

  PCC_AUTH0_CLIENT_ID:
    value:

  PCC_AUTH0_CLIENT_SECRET:
    value:

  PCC_AUTH0_SECRET:
    value:

  SUPABASE_URL:
    value:

  POSTGRES_API_KEY:
    value:

  M2M_AUTH_CLIENT_ID:
    value:

  M2M_AUTH_CLIENT_SECRET:
    value:

  LFX_V2_SERVICE:
    value:

  NATS_URL:
    value:

  AI_PROXY_URL:
    value:

  AI_API_KEY:
    value:

  # Snowflake Analytics Configuration
  # Required for analytics endpoints: active-weeks-streak, pull-requests-merged, code-commits
  SNOWFLAKE_ACCOUNT:
    value:

  SNOWFLAKE_USER:
    value:

  SNOWFLAKE_ROLE:
    value:

  SNOWFLAKE_DATABASE:
    value:

  SNOWFLAKE_WAREHOUSE:
    value:

  SNOWFLAKE_API_KEY:
    value:

  # Optional Snowflake configuration
  SNOWFLAKE_LOG_LEVEL:
    value: "ERROR"

  SNOWFLAKE_LOCK_STRATEGY:
    value: "memory"

  SNOWFLAKE_MIN_CONNECTIONS:
    value: "2"

  SNOWFLAKE_MAX_CONNECTIONS:
    value: "10"
