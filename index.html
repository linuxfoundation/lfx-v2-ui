<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LFX v2 Branch Deployments</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f6f8fa;
      color: #24292f;
      padding: 24px 10%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    h1 { font-size: 20px; }
    .refresh-btn {
      font-size: 12px;
      color: #0969da;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .refresh-btn:hover:not(:disabled) { text-decoration: underline; }
    .refresh-btn:disabled { color: #57606a; cursor: not-allowed; }
    .subtitle { color: #57606a; margin-bottom: 24px; }

    .section { margin-bottom: 32px; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d0d7de;
    }
    .section-title { font-size: 16px; font-weight: 600; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      font-weight: 600;
      color: #57606a;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    td { padding: 10px 14px; border-bottom: 1px solid #d0d7de; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f6f8fa; }

    .env-name { font-weight: 600; font-family: monospace; font-size: 13px; }
    .branch-ref, .sha { font-family: monospace; font-size: 12px; color: #57606a; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge::before { content: "●"; font-size: 10px; }
    .badge-success  { background: #dafbe1; color: #1a7f37; }
    .badge-failure  { background: #ffebe9; color: #cf222e; }
    .badge-pending  { background: #fff8c5; color: #9a6700; }
    .badge-inactive { background: #f6f8fa; color: #57606a; }

    .link { color: #0969da; text-decoration: none; }
    .link:hover { text-decoration: underline; }

    .actions { display: flex; gap: 10px; }
    .time { color: #57606a; font-size: 12px; }

    .empty   { padding: 24px; text-align: center; color: #57606a; background: white; border: 1px solid #d0d7de; border-radius: 6px; }
    .error   { padding: 12px 16px; background: #ffebe9; border: 1px solid #ff818266; border-radius: 6px; color: #cf222e; margin-bottom: 16px; }
    .warning { padding: 12px 16px; background: #fff8c5; border: 1px solid #d4a72c66; border-radius: 6px; color: #9a6700; margin-bottom: 16px; }
    .loading { padding: 24px; text-align: center; color: #57606a; }
  </style>
</head>
<body>

<header>
  <h1>LFX v2 Branch Deployments</h1>
</header>
<p class="subtitle">Active preview deployments for <code>lfx-v2-ui</code></p>

<div class="section">
  <div class="section-header">
    <span class="section-title">Pull Request Previews</span>
    <button class="refresh-btn" onclick="loadPRs()">↻ Refresh</button>
  </div>
  <div id="pr-error"></div>
  <div id="pr-content"><p class="loading">Loading…</p></div>
</div>

<div class="section">
  <div class="section-header">
    <span class="section-title">Feature Branch Previews</span>
    <button class="refresh-btn" onclick="loadFeatures()" disabled>↻ Refresh</button>
  </div>
  <div id="feat-error"></div>
  <div id="feat-content"><p class="empty">Feature branch previews coming soon.</p></div>
</div>

<script src="dashboard.js?v=2"></script>
</body>
</html>
