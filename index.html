<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="300">
  <title>LFX v2 Branch Deployments</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f6f8fa;
      color: #24292f;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    h1 { font-size: 20px; }
    .refresh-btn {
      font-size: 12px;
      color: #0969da;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .refresh-btn:hover { text-decoration: underline; }
    .subtitle { color: #57606a; margin-bottom: 24px; }

    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d0d7de;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      font-weight: 600;
      color: #57606a;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    td { padding: 10px 14px; border-bottom: 1px solid #d0d7de; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f6f8fa; }

    .env-name { font-weight: 600; font-family: monospace; font-size: 13px; }
    .branch-ref, .sha { font-family: monospace; font-size: 12px; color: #57606a; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge::before { content: "●"; font-size: 10px; }
    .badge-success  { background: #dafbe1; color: #1a7f37; }
    .badge-failure  { background: #ffebe9; color: #cf222e; }
    .badge-pending  { background: #fff8c5; color: #9a6700; }
    .badge-inactive { background: #f6f8fa; color: #57606a; }

    .link { color: #0969da; text-decoration: none; }
    .link:hover { text-decoration: underline; }

    .actions { display: flex; gap: 10px; }
    .time { color: #57606a; font-size: 12px; }

    .empty   { padding: 24px; text-align: center; color: #57606a; background: white; border: 1px solid #d0d7de; border-radius: 6px; }
    .error   { padding: 12px 16px; background: #ffebe9; border: 1px solid #ff818266; border-radius: 6px; color: #cf222e; margin-bottom: 16px; }
    .loading { padding: 24px; text-align: center; color: #57606a; }
  </style>
</head>
<body>

<header>
  <h1>LFX v2 Branch Deployments</h1>
  <button class="refresh-btn" onclick="load()">↻ Refresh</button>
</header>
<p class="subtitle">Active preview deployments for <code>lfx-v2-ui</code></p>

<div id="error"></div>
<div id="content"><p class="loading">Loading…</p></div>

<script>
const OWNER = 'linuxfoundation';
const REPO  = 'lfx-v2-ui';

async function ghFetch(path) {
  const res = await fetch(`https://api.github.com${path}`, {
    headers: { 'Accept': 'application/vnd.github+json' }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}: ${res.statusText}`);
  return res.json();
}

async function latestStatus(deploymentId) {
  const statuses = await ghFetch(
    `/repos/${OWNER}/${REPO}/deployments/${deploymentId}/statuses?per_page=1`
  );
  return statuses[0] ?? null;
}

function relativeTime(iso) {
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function badgeClass(state) {
  return { success: 'badge-success', failure: 'badge-failure',
           error: 'badge-failure',   pending: 'badge-pending',
           in_progress: 'badge-pending' }[state] ?? 'badge-inactive';
}

function renderTable(rows, isPrTable) {
  if (!rows.length) return `<p class="empty">No active deployments.</p>`;
  const trs = rows.map(d => {
    const s      = d.latestStatus;
    const state  = s?.state ?? 'pending';
    const envUrl = d.envUrl ?? s?.environment_url ?? '';
    const logUrl = s?.log_url ?? '';

    const envName = d.environment ?? `ui-pr-${d.prNumber}`;
    const linkCell = [
      envUrl ? `<a class="link env-name" href="${envUrl}" target="_blank">${envName}</a>`
             : `<span class="env-name">${envName}</span>`,
      logUrl && `<a class="link" href="${logUrl}" target="_blank" style="font-size:12px">ArgoCD ↗</a>`,
    ].filter(Boolean).join(' ');

    const prCell = d.prNumber
      ? `<a class="link" href="https://github.com/${OWNER}/${REPO}/pull/${d.prNumber}" target="_blank">#${d.prNumber}</a>`
      : '';

    const ref  = d.ref  ?? '';
    const sha  = d.sha  ? d.sha.slice(0, 7) : '';
    const time = d.updated_at ? `<span class="time" title="${d.updated_at}">${relativeTime(d.updated_at)}</span>` : '—';

    if (isPrTable) {
      return `<tr>
        <td><span class="badge ${badgeClass(state)}">${state}</span></td>
        <td>${linkCell}</td>
        <td>${prCell}</td>
        <td><span class="branch-ref">${ref}</span></td>
        <td><span class="sha">${sha}</span></td>
        <td>${time}</td>
      </tr>`;
    }

    return `<tr>
      <td><span class="badge ${badgeClass(state)}">${state}</span></td>
      <td>${linkCell}</td>
      <td><span class="branch-ref">${ref}</span></td>
      <td><span class="sha">${sha}</span></td>
      <td>${time}</td>
    </tr>`;
  }).join('');

  if (isPrTable) {
    return `<table>
      <thead><tr>
        <th>Status</th><th>Link</th><th>PR</th>
        <th>Branch / Ref</th><th>SHA</th><th>Last Updated</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
  }

  return `<table>
    <thead><tr>
      <th>Status</th><th>Link</th><th>Branch / Ref</th><th>SHA</th><th>Last Updated</th>
    </tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

async function load() {
  document.getElementById('error').innerHTML = '';
  document.getElementById('content').innerHTML = '<p class="loading">Loading…</p>';

  try {
    const [all, labeledIssues] = await Promise.all([
      ghFetch(`/repos/${OWNER}/${REPO}/deployments?per_page=100`),
      ghFetch(`/repos/${OWNER}/${REPO}/issues?labels=deploy-preview&state=open&per_page=100`),
    ]);

    // Build a map of environment name -> most recent deployment
    const deployByEnv = new Map();
    for (const d of all) {
      if (!deployByEnv.has(d.environment)) deployByEnv.set(d.environment, d);
    }

    // Collect feature branch deployments
    function collect(pattern) {
      const seen = new Map();
      for (const d of all) {
        if (pattern.test(d.environment) && !seen.has(d.environment))
          seen.set(d.environment, d);
      }
      return [...seen.values()];
    }

    const feats = collect(/^ui-feat-/);

    async function withStatus(list) {
      return Promise.all(
        list.map(async d => ({ ...d, latestStatus: await latestStatus(d.id) }))
      );
    }

    // Build PR rows from labeled PRs — fetch each PR for branch/SHA
    const labeledPRs = labeledIssues.filter(i => i.pull_request);
    const prDetails = await Promise.all(
      labeledPRs.map(pr => ghFetch(`/repos/${OWNER}/${REPO}/pulls/${pr.number}`))
    );

    const prRowsRaw = prDetails.map(pr => {
      const envName    = `ui-pr-${pr.number}`;
      const envUrl     = `https://${envName}.dev.v2.cluster.linuxfound.info`;
      const deployment = deployByEnv.get(envName) ?? null;
      return {
        prNumber:   pr.number,
        ref:        pr.head.ref,
        sha:        pr.head.sha,
        environment: envName,
        envUrl,
        updated_at: deployment?.updated_at ?? pr.updated_at,
        id:         deployment?.id ?? null,
      };
    });

    const prRows = await Promise.all(
      prRowsRaw.map(async d =>
        d.id ? { ...d, latestStatus: await latestStatus(d.id) } : { ...d, latestStatus: null }
      )
    );

    const featRows = await withStatus(feats);

    const byTime = (a, b) => {
      if (!a.updated_at) return 1;
      if (!b.updated_at) return -1;
      return new Date(b.updated_at) - new Date(a.updated_at);
    };
    prRows.sort(byTime);
    featRows.sort(byTime);

    document.getElementById('content').innerHTML = `
      <div class="section">
        <div class="section-title">Pull Request Previews (${prRows.length})</div>
        ${renderTable(prRows, true)}
      </div>
      <div class="section">
        <div class="section-title">Feature Branch Previews (${featRows.length})</div>
        ${renderTable(featRows, false)}
      </div>
    `;
  } catch (e) {
    document.getElementById('error').innerHTML = `<div class="error">${e.message}</div>`;
    document.getElementById('content').innerHTML = '';
  }
}

load();
</script>
</body>
</html>
